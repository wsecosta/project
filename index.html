    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-main: #f8fafc;
            --slate-900: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-Pendente { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; }
        .status-Andamento { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
        .status-Planeamento { background: #f0f9ff; color: #0284c7; border: 1px solid #bae6fd; }
        .status-Concluído { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        .progress-bar-container {
            height: 8px;
            background: #f1f5f9;
            border-radius: 9999px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(16px);
            padding-top: 0.5rem; 
            padding-bottom: 0.5rem; 
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .scrolled-header {
            border-bottom-color: #e2e8f0;
            box-shadow: 0 4px 12px -3px rgba(0, 0, 0, 0.05);
        }

        .stats-pill-container {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            padding: 4px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 36px;
            flex-wrap: nowrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .logo-section-print {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 130px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 900;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 9px;
            font-weight: 800;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .icon-btn-print {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #64748b;
            transition: all 0.2s;
        }
        .icon-btn-print:hover { background: #f1f5f9; color: #6366f1; }

        .search-container-print {
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            height: 36px;
            width: 200px;
        }

        .search-container-print input {
            background: transparent;
            border: none;
            outline: none;
            padding: 6px;
            width: 100%;
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
        }

        .btn-main-print {
            background: #6366f1;
            color: white;
            border-radius: 10px;
            padding: 0 14px;
            height: 36px;
            font-weight: 800;
            font-size: 9px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
        }

        .modal-compact-container {
            padding: 1.25rem !important;
            gap: 0.75rem !important;
        }
        
        .modal-compact-container input, 
        .modal-compact-container select {
            padding: 0.6rem 0.8rem !important;
            font-size: 0.8rem !important;
            border-radius: 0.75rem !important;
        }

        .note-input {
            background: #fdfdfd;
            border: 1px solid #e2e8f0;
            width: 100%;
            resize: none;
            font-size: 11px;
            color: #1e293b;
            line-height: 1.5;
            padding: 10px;
            outline: none;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .note-text-display {
            white-space: pre-wrap;
            word-break: break-word;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideUp 0.3s ease-out; }

        .search-highlight {
            background-color: #fef08a;
            color: #854d0e;
            padding: 0 1px;
            border-radius: 2px;
            font-weight: 700;
        }

        .login-bg {
            background: radial-gradient(circle at top right, #4f46e5, transparent),
                        radial-gradient(circle at bottom left, #1e1b4b, #0f172a);
        }
    </style>
<!-- ... existing code ... -->
    <script type="text/babel" data-type="module">
        /* ... existing firebase imports ... */
<!-- ... existing code ... -->
        function App() {
            /* ... existing states ... */

            /* ... existing handlers: handleLogin, handleLogout, exportBackup, importBackup ... */
<!-- ... existing code ... -->
            const saveProject = async (e) => {
                e.preventDefault();
                if (!user) return;
                try {
                    if (editingId) await updateDoc(doc(db, DB_COLLECTION, editingId), taskData);
                    else await addDoc(collection(db, DB_COLLECTION), { ...taskData, status: 'Pendente', subtasks: [], createdAt: serverTimestamp(), createdBy: user.uid });
                    closeTaskModal();
                } catch (err) { console.error(err); }
            };

            /* ... existing subtask and note handlers: saveSubtask, toggleSub, toggleHistoryNote, addHistoryNote, etc. ... */
<!-- ... existing code ... -->
            const stats = {
                total: projects.length,
                pending: projects.filter(p => p.status === 'Pendente').length,
                progress: projects.filter(p => p.status === 'Andamento').length,
                planning: projects.filter(p => p.status === 'Planeamento').length,
                completed: projects.filter(p => p.status === 'Concluído').length
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black tracking-widest uppercase text-xs">SECURITY AUTHENTICATION...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen login-bg flex items-center justify-center p-6">
                        <div className="bg-white p-12 rounded-[2rem] shadow-2xl w-full max-w-md animate-slide text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>
                            <div className="bg-indigo-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-600 text-3xl shadow-sm"><i className="fas fa-shield-halved"></i></div>
                            <h2 className="text-3xl font-black text-slate-900 mb-2">Portal IDW</h2>
                            <p className="text-slate-400 font-bold text-xs uppercase tracking-[0.2em] mb-10">Autenticação Segura</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-medium" placeholder="Email"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-medium" placeholder="Senha"/>
                                {loginError && <p className="text-rose-500 text-[10px] font-black">{loginError}</p>}
                                <button type="submit" disabled={isLoggingIn} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">
                                    {isLoggingIn ? 'A verificar...' : 'Entrar'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen text-slate-800 flex flex-col">
                    {}
                    <div className={`sticky-header-container px-4 md:px-10 ${isScrolled ? 'scrolled-header' : ''}`}>
                        <div className="max-w-[1700px] mx-auto flex items-center justify-between">
                            <div className="logo-section-print">
                                <div className="logo-box"><i className="fas fa-layer-group text-sm"></i></div>
                                <div className="logo-text">
                                    <h1>IDW</h1>
                                    <span>Gestão 2026 • <b className="text-rose-500 font-bold lowercase italic ml-1 tracking-tight text-[11px]">{user.email}</b></span>
                                </div>
                            </div>

                            <div className="hidden lg:flex flex-1 justify-center">
                                <div className="stats-pill-container shadow-sm">
                                    <div className="stat-item"><div className="dot bg-amber-400"></div><span>{stats.progress} EXECUÇÃO</span></div>
                                    <div className="stat-item border-l border-slate-200 pl-3"><div className="dot bg-emerald-400"></div><span>{stats.completed} FIM</span></div>
                                    <div className="stat-item border-l border-slate-200 pl-3"><div className="dot bg-rose-400"></div><span>{stats.pending} PEND</span></div>
                                    <div className="stat-item border-l border-slate-200 pl-3"><div className="dot bg-sky-400"></div><span>{stats.planning} PLAN</span></div>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <div className="search-container-print">
                                    <i className="fas fa-magnifying-glass text-slate-400 text-xs"></i>
                                    <input type="text" placeholder="Filtrar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <button onClick={exportBackup} className="icon-btn-print" title="Backup"><i className="fas fa-file-export"></i></button>
                                <button onClick={triggerImport} className="icon-btn-print" title="Restore"><i className="fas fa-file-import"></i></button>
                                <input type="file" ref={fileInputRef} onChange={importBackup} accept=".json" hidden />
                                <button onClick={() => setGlobalCollapse(prev => ({ collapsed: !prev.collapsed, count: prev.count + 1 }))} className="icon-btn-print"><i className={globalCollapse.collapsed ? 'fas fa-expand' : 'fas fa-compress'}></i></button>
                                <button onClick={() => setHideCompleted(!hideCompleted)} className="icon-btn-print"><i className={hideCompleted ? 'fas fa-eye text-indigo-500' : 'fas fa-eye-slash'}></i></button>
                                <button onClick={() => setIsTaskModalOpen(true)} className="btn-main-print shadow-md ml-2"><i className="fas fa-plus"></i> NOVO PROJETO</button>
                                <button onClick={handleLogout} className="icon-btn-print text-rose-500 ml-1"><i className="fas fa-power-off"></i></button>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-[1700px] mx-auto px-4 md:px-12 py-8 flex-grow w-full">
                        <div className="grid grid-cols-1 gap-8">
                            {filteredProjects.map(p => (
                                <ProjectCard 
                                    key={p.id} p={p} 
                                    isCompact={hideCompleted && p.status === 'Concluído'}
                                    globalCollapse={globalCollapse} 
                                    searchTerm={searchTerm}
                                    onEdit={() => openEditTask(p)}
                                    onDelete={() => deleteProject(p.id)}
                                    onStatus={(s) => updateStatus(p.id, s)}
                                    onToggleSub={(sId) => toggleSub(p.id, sId)}
                                    onEditSubtask={(sId, nTitle) => editSubtask(p.id, sId, nTitle)}
                                    onDeleteSubtask={(sId) => deleteSubtask(p.id, sId)}
                                    onAddHistoryNote={(sId, txt) => addHistoryNote(p.id, sId, txt)}
                                    onEditHistoryNote={(sId, nIdx, txt) => editHistoryNote(p.id, sId, nIdx, txt)}
                                    onDeleteHistoryNote={(sId, nIdx) => deleteHistoryNote(p.id, sId, nIdx)}
                                    onToggleHistoryNote={(sId, nIdx) => toggleHistoryNote(p.id, sId, nIdx)}
                                    onAddSub={() => { setSubtaskData({ parentId: p.id, subId: null, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                />
                            ))}
                        </div>
                    </main>

                    {}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xl modal-compact-container animate-slide shadow-2xl border border-slate-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-black text-slate-900 tracking-tight">{editingId ? 'Editar Registo' : 'Novo Projeto'}</h3>
                                    <button onClick={closeTaskModal} className="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-rose-500 transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={saveProject} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="col-span-full space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Nome do Projeto</label>
                                        <input required type="text" value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Início</label>
                                        <input required type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Limite</label>
                                        <input required type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold text-rose-600"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Prioridade</label>
                                        <select value={taskData.priority} onChange={e => setTaskData({...taskData, priority: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold"><option>Baixa</option><option>Média</option><option>Alta</option></select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Responsável</label>
                                        <input type="text" value={taskData.owner} onChange={e => setTaskData({...taskData, owner: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Equipa</label>
                                        <input type="text" value={taskData.team} onChange={e => setTaskData({...taskData, team: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Empresa</label>
                                        <input type="text" value={taskData.company} onChange={e => setTaskData({...taskData, company: e.target.value})} className="w-full bg-slate-50 border border-slate-100 outline-none font-bold"/>
                                    </div>
                                    <div className="col-span-full pt-4 flex gap-3">
                                        <button type="button" onClick={closeTaskModal} className="flex-1 py-3 text-slate-400 font-black uppercase text-[10px] tracking-widest hover:bg-slate-50 rounded-xl">Voltar</button>
                                        <button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {}
                    {isSubtaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-md p-6 animate-slide shadow-2xl border border-slate-100">
                                <h3 className="text-lg font-black mb-4 tracking-tight text-slate-900 uppercase">Registar Atividade</h3>
                                <form onSubmit={saveSubtask} className="space-y-3">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Título</label>
                                        <input required placeholder="O que foi feito..." value={subtaskData.title} onChange={e => setSubtaskData({...subtaskData, title: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none text-sm font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Relatório Inicial</label>
                                        <textarea placeholder="Detalhes..." required value={subtaskData.note} onChange={e => setSubtaskData({...subtaskData, note: e.target.value})} className="note-input" rows="3"/>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setIsSubtaskModalOpen(false)} className="flex-1 py-3 text-slate-400 font-black uppercase tracking-widest text-[10px] rounded-xl">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black uppercase tracking-widest text-[10px] shadow-lg">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProjectCard({ p, isCompact, globalCollapse, searchTerm, onEdit, onDelete, onStatus, onToggleSub, onEditSubtask, onDeleteSubtask, onAddSub, onAddHistoryNote, onEditHistoryNote, onDeleteHistoryNote, onToggleHistoryNote }) {
            const [isCollapsed, setIsCollapsed] = useState(isCompact);
            const [addingToSubId, setAddingToSubId] = useState(null);
            const [newNoteText, setNewNoteText] = useState("");
            const [editingNote, setEditingNote] = useState({ subId: null, idx: null });
            const [editNoteText, setEditNoteText] = useState("");

            useEffect(() => { setIsCollapsed(isCompact); }, [isCompact]);
            useEffect(() => { if (globalCollapse && globalCollapse.count > 0 && p.status !== 'Concluído') setIsCollapsed(globalCollapse.collapsed); }, [globalCollapse.count]);

            const total = p.subtasks?.length || 0;
            const sumProgress = p.subtasks?.reduce((acc, sub) => acc + (sub.progress ?? (sub.completed ? 100 : 0)), 0) || 0;
            const progress = total > 0 ? Math.round(sumProgress / total) : (p.status === 'Concluído' ? 100 : 0);
            
            const handleAddNote = (sub) => { if (!newNoteText.trim()) return; onAddHistoryNote(sub.id, newNoteText); setNewNoteText(""); setAddingToSubId(null); };
            const handleSaveEditNote = (subId, idx) => { if (editNoteText.trim() !== "") onEditHistoryNote(subId, idx, editNoteText); setEditingNote({ subId: null, idx: null }); };

            return (
                <div className={`glass-card rounded-[1.5rem] p-6 transition-all ${isCollapsed ? 'opacity-70 bg-slate-50/50' : 'bg-white'}`}>
                    <div className="flex flex-col md:flex-row justify-between gap-6 items-start">
                        {}
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`status-pill status-${p.status}`}>{p.status === 'Andamento' ? 'Em Execução' : p.status}</span>
                                <span className="text-[9px] font-black uppercase text-slate-400 bg-slate-100 px-2 py-1 rounded-md">PRIO: {p.priority}</span>
                            </div>
                            <h3 className="text-xl md:text-2xl font-black text-slate-900 mb-2 leading-tight break-words">
                                <HighlightedText text={p.title} term={searchTerm} />
                            </h3>
                            <p className="text-[10px] text-slate-400 font-bold uppercase flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg inline-flex border border-slate-100">
                                <i className="far fa-calendar-alt text-indigo-500"></i> {formatDate(p.start)} — <span className="text-rose-500">{formatDate(p.end)}</span>
                            </p>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-slate-50/50 p-4 rounded-2xl border border-slate-100 min-w-[300px] shadow-inner">
                            <div className="space-y-1.5 text-[10px] flex-1">
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-user-tie text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.owner}</span></div>
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-users text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.team}</span></div>
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-building text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.company}</span></div>
                            </div>
                            <div className="flex flex-col gap-2">
                                <button onClick={() => setIsCollapsed(!isCollapsed)} className="w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-indigo-600"><i className={`fas fa-angle-${isCollapsed ? 'down' : 'up'}`}></i></button>
                                <button onClick={onEdit} className="w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-indigo-600"><i className="fas fa-edit"></i></button>
                                <button onClick={() => onDelete(p.id)} className="w-10 h-10 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center text-rose-400 hover:bg-rose-500 hover:text-white"><i className="fas fa-trash-can"></i></button>
                            </div>
                        </div>
                    </div>

                    {!isCollapsed && (
                        <div className="mt-8 pt-8 border-t border-slate-100 animate-slide space-y-6">
                            <div className="flex items-center justify-between gap-6">
                                <div className="flex-1">
                                    <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-2"><span>Progresso Consolidado</span><span>{progress}%</span></div>
                                    <div className="progress-bar-container"><div className="progress-bar-fill bg-indigo-500 shadow-md shadow-indigo-100" style={{width: `${progress}%`}}></div></div>
                                </div>
                                <button onClick={onAddSub} className="h-10 px-6 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-indigo-100 hover:scale-105 active:scale-95 transition-all">Nova Atividade</button>
                            </div>

                            <div className="grid grid-cols-1 gap-4">
                                {p.subtasks?.map(sub => (
                                    <div key={sub.id} className="bg-slate-50/50 p-5 rounded-2xl border border-slate-100 group/sub hover:bg-white hover:shadow-md transition-all border-l-4 border-l-indigo-400">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="flex items-center gap-4 flex-1">
                                                <input type="checkbox" checked={sub.completed} onChange={() => onToggleSub(sub.id)} className="w-5 h-5 rounded-lg border-2 border-slate-200 text-indigo-600 cursor-pointer"/>
                                                <div className="flex-1">
                                                    <p className={`text-sm font-black ${sub.completed ? 'line-through text-slate-300' : 'text-slate-800'}`}>{sub.title}</p>
                                                    <div className="flex items-center gap-3 mt-1">
                                                        <div className="h-1 bg-slate-200 w-24 rounded-full overflow-hidden">
                                                            <div className="h-full bg-indigo-400 transition-all" style={{width: `${sub.progress ?? (sub.completed ? 100 : 0)}%`}}></div>
                                                        </div>
                                                        <span className="text-[8px] font-black text-indigo-400 uppercase">{sub.progress ?? (sub.completed ? 100 : 0)}%</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={() => setAddingToSubId(addingToSubId === sub.id ? null : sub.id)} className={`text-[9px] font-black px-4 py-2 rounded-lg transition-all border ${addingToSubId === sub.id ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-600 border-indigo-100 hover:bg-indigo-50'}`}>Nova Nota</button>
                                        </div>

                                        {addingToSubId === sub.id && (
                                            <div className="mt-4 space-y-3 animate-slide bg-white p-4 rounded-xl border border-indigo-50 border-dashed">
                                                <textarea className="note-input" placeholder="Detalhe o progresso aqui..." value={newNoteText} onChange={(e) => setNewNoteText(e.target.value)} rows="3" autoFocus />
                                                <div className="flex justify-end"><button onClick={() => handleAddNote(sub)} className="bg-slate-900 text-white text-[9px] px-4 py-2 rounded-lg uppercase font-black shadow-lg">Registar na Cloud</button></div>
                                            </div>
                                        )}

                                        {}
                                        {sub.notes?.length > 0 && (
                                            <div className="mt-4 pl-5 border-l-2 border-indigo-100 space-y-3">
                                                {sub.notes.map((n, idx) => (
                                                    <div key={idx} className="bg-white p-3.5 rounded-xl border border-slate-100 shadow-sm relative group/note">
                                                        {editingNote.subId === sub.id && editingNote.idx === idx ? (
                                                            <div className="space-y-3">
                                                                <textarea className="note-input w-full" value={editNoteText} onChange={(e) => setEditNoteText(e.target.value)} rows="3" autoFocus />
                                                                <div className="flex justify-end gap-3"><button onClick={() => setEditingNote({subId:null, idx:null})} className="text-[9px] uppercase font-black text-slate-400">Cancelar</button><button onClick={() => handleSaveEditNote(sub.id, idx)} className="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-[9px] uppercase font-black">Salvar Alteração</button></div>
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-start gap-4">
                                                                <input type="checkbox" checked={n.completed || false} onChange={() => onToggleHistoryNote(sub.id, idx)} className="mt-1 w-4 h-4 rounded border-slate-200 text-indigo-500 cursor-pointer"/>
                                                                <div className="flex-1">
                                                                    <p className={`note-text-display text-xs font-medium leading-relaxed ${n.completed ? 'line-through opacity-30 text-slate-400' : 'text-slate-600'}`}>{n.text}</p>
                                                                    <div className="flex justify-between items-center mt-3 pt-2 border-t border-slate-50">
                                                                        <span className="text-[8px] text-slate-300 font-bold uppercase tracking-widest flex items-center gap-2">
                                                                            <i className="far fa-clock"></i> {n.time} {n.lastEdit ? `• EDITADO: ${n.lastEdit}` : ''}
                                                                        </span>
                                                                        <div className="flex gap-2 opacity-0 group-hover/note:opacity-100 transition-opacity">
                                                                            <button onClick={() => { setEditingNote({subId: sub.id, idx}); setEditNoteText(n.text); }} className="text-indigo-300 hover:text-indigo-600 p-1"><i className="fas fa-pencil"></i></button>
                                                                            <button onClick={() => onDeleteHistoryNote(sub.id, idx)} className="text-rose-200 hover:text-rose-500 p-1"><i className="fas fa-trash-can"></i></button>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function formatDate(s) {
            if (!s) return '-';
            const [y, m, d] = s.split('-');
            return `${d}/${m}/${y}`;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
