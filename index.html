<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDW | Soluções IT | Gestão e Projetos</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-main: #f8fafc;
            --slate-900: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-Pendente { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; }
        .status-Andamento { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
        .status-Planeamento { background: #f0f9ff; color: #0284c7; border: 1px solid #bae6fd; }
        .status-Concluído { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        .progress-bar-container {
            height: 8px;
            background: #f1f5f9;
            border-radius: 9999px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(16px);
            padding-top: 0.75rem; 
            padding-bottom: 0.5rem; 
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .scrolled-header {
            border-bottom-color: #e2e8f0;
            box-shadow: 0 4px 12px -3px rgba(0, 0, 0, 0.05);
        }

        .logo-section-print {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 130px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 900;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 10px;
            font-weight: 800;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .btn-premium {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-premium:active { transform: scale(0.96); }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.3);
        }

        .search-container-print {
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            height: 38px;
            width: 220px;
        }

        .search-container-print input {
            background: transparent;
            border: none;
            outline: none;
            padding: 6px;
            width: 100%;
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
        }

        .btn-main-print {
            background: #6366f1;
            color: white;
            border-radius: 12px;
            padding: 0 16px;
            height: 38px;
            font-weight: 800;
            font-size: 9px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
        }

        .modal-compact-container {
            padding: 1.5rem !important; /* Reduzido de 2.5rem */
            gap: 1rem !important; /* Reduzido de 2rem */
        }
        
        .modal-compact-container input, 
        .modal-compact-container select {
            padding: 0.75rem !important; /* Mais baixo */
        }

        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-slide { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        .note-input {
            background: #fdfdfd;
            border: 1px solid #e2e8f0;
            width: 100%;
            resize: none;
            font-size: 11px;
            color: #1e293b;
            line-height: 1.5;
            padding: 10px;
            outline: none;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .note-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .search-highlight {
            background-color: #fef08a;
            color: #854d0e;
            padding: 0 1px;
            border-radius: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut,
            setPersistence,
            browserSessionPersistence 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            setDoc,
            onSnapshot, 
            addDoc, 
            updateDoc, 
            deleteDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBou2nfAg9EL2kam8y1_8qPtRcUfJvo9AE",
            authDomain: "ger-projeto-ansr.firebaseapp.com",
            projectId: "ger-projeto-ansr",
            storageBucket: "ger-projeto-ansr.firebasestorage.app",
            messagingSenderId: "409599611361",
            appId: "1:409599611361:web:f9dd2ab0915e14ed3902a0",
            measurementId: "G-PV4NR6B03C"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const DB_COLLECTION = 'projects';

        function HighlightedText({ text, term }) {
            if (!term.trim() || !text) return <span>{text}</span>;
            const parts = text.split(new RegExp(`(${term})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === term.toLowerCase() 
                            ? <mark key={i} className="search-highlight">{part}</mark> 
                            : part
                    )}
                </span>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [isScrolled, setIsScrolled] = useState(false);
            const [hideCompleted, setHideCompleted] = useState(false);
            const [globalCollapse, setGlobalCollapse] = useState({ collapsed: false, count: 0 });
            const [searchTerm, setSearchTerm] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isSubtaskModalOpen, setIsSubtaskModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [taskData, setTaskData] = useState({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            const [subtaskData, setSubtaskData] = useState({ parentId: '', subId: null, title: '', note: '' });

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError(null);
                setIsLoggingIn(true);
                try {
                    await setPersistence(auth, browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setLoginError("Acesso negado. Verifique os seus dados.");
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = async () => {
                if (window.confirm("Deseja encerrar a sessão com segurança?")) {
                    try {
                        await signOut(auth);
                        setUser(null);
                    } catch (err) {}
                }
            };

            const exportBackup = () => {
                const dataStr = JSON.stringify(projects, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', `backup_ansr_${new Date().toISOString().split('T')[0]}.json`);
                linkElement.click();
            };

            const importBackup = async (e) => {
                const file = e.target.files[0];
                if (!file || !user) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (!window.confirm(`Vai importar ${importedData.length} projetos. Confirma?`)) return;
                        for (const proj of importedData) {
                            const { id, ...projectData } = proj;
                            await setDoc(doc(db, DB_COLLECTION, id || Date.now().toString()), projectData);
                        }
                    } catch (error) { console.error(error); }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const triggerImport = () => fileInputRef.current && fileInputRef.current.click();

            const closeTaskModal = () => {
                setIsTaskModalOpen(false);
                setEditingId(null);
                setTaskData({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            };

            const openEditTask = (p) => {
                setEditingId(p.id);
                setTaskData({
                    title: p.title || '', start: p.start || '', end: p.end || '',
                    priority: p.priority || 'Média', owner: p.owner || '', team: p.team || '', company: p.company || ''
                });
                setIsTaskModalOpen(true);
            };

            const saveProject = async (e) => {
                e.preventDefault();
                if (!user) return;
                try {
                    if (editingId) await updateDoc(doc(db, DB_COLLECTION, editingId), taskData);
                    else await addDoc(collection(db, DB_COLLECTION), { ...taskData, status: 'Pendente', subtasks: [], createdAt: serverTimestamp(), createdBy: user.uid });
                    closeTaskModal();
                } catch (err) { console.error(err); }
            };

            const deleteProject = async (id) => {
                if (!user || !window.confirm("Eliminar este projeto permanentemente?")) return;
                try { await deleteDoc(doc(db, DB_COLLECTION, id)); } catch(err) { }
            };

            const updateStatus = async (id, newStatus) => {
                if (!user) return;
                try { await updateDoc(doc(db, DB_COLLECTION, id), { status: newStatus }); } catch(err) { }
            };

            const saveSubtask = async (e) => {
                e.preventDefault();
                if (!user) return;
                const p = projects.find(proj => proj.id === subtaskData.parentId);
                if (!p) return;
                let newSubs = [...(p.subtasks || [])];
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                newSubs.push({ id: Date.now().toString(), title: subtaskData.title, completed: false, progress: 0, notes: subtaskData.note.trim() ? [{ text: subtaskData.note, time, completed: false }] : [] });
                try {
                    await updateDoc(doc(db, DB_COLLECTION, p.id), { subtasks: newSubs, status: p.status === 'Pendente' || p.status === 'Planeamento' ? 'Andamento' : p.status });
                    setIsSubtaskModalOpen(false);
                    setSubtaskData({ parentId: '', subId: null, title: '', note: '' });
                } catch(err) { }
            };

            const editSubtask = async (projectId, subtaskId, newTitle) => {
                if (!newTitle.trim()) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const newSubtasks = project.subtasks.map(sub => sub.id === subtaskId ? { ...sub, title: newTitle } : sub);
                try { await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks }); } catch(err) { }
            };

            const deleteSubtask = async (projectId, subtaskId) => {
                if (!window.confirm("Remover permanentemente?")) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const newSubtasks = project.subtasks.filter(sub => sub.id !== subtaskId);
                const allDone = newSubtasks.length > 0 && newSubtasks.every(s => s.completed);
                try {
                    await updateDoc(doc(db, DB_COLLECTION, projectId), { 
                        subtasks: newSubtasks,
                        status: allDone ? 'Concluído' : (project.status === 'Concluído' && newSubtasks.length > 0 ? 'Andamento' : project.status)
                    });
                } catch(err) { }
            };

            const toggleSub = async (tId, sId) => {
                const p = projects.find(proj => proj.id === tId);
                const newSubs = p.subtasks.map(s => {
                    if (s.id === sId) {
                        const isCompleted = !s.completed;
                        const newNotes = (s.notes || []).map(n => ({ ...n, completed: isCompleted }));
                        return { ...s, completed: isCompleted, notes: newNotes, progress: isCompleted ? 100 : 0 };
                    }
                    return s;
                });
                const allDone = newSubs.length > 0 && newSubs.every(s => s.completed);
                try { await updateDoc(doc(db, DB_COLLECTION, tId), { subtasks: newSubs, status: allDone ? 'Concluído' : (p.status === 'Concluído' ? 'Andamento' : p.status) });
                } catch(err) { }
            };

            const toggleHistoryNote = async (projectId, subtaskId, noteIndex) => {
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes[noteIndex] = { ...newNotes[noteIndex], completed: !newNotes[noteIndex].completed };
                        const completedCount = newNotes.filter(n => n.completed).length;
                        const newProgress = newNotes.length > 0 ? Math.round((completedCount / newNotes.length) * 100) : 0;
                        return { ...sub, notes: newNotes, progress: newProgress, completed: newProgress === 100 };
                    }
                    return sub;
                });
                const allDone = newSubtasks.length > 0 && newSubtasks.every(s => s.completed);
                try { await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks, status: allDone ? 'Concluído' : (project.status === 'Concluído' ? 'Andamento' : project.status) });
                } catch(err) { }
            };

            const addHistoryNote = async (projectId, subtaskId, text) => {
                if (!text.trim()) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || []), { text, time, completed: false }];
                        const completedCount = newNotes.filter(n => n.completed).length;
                        const newProgress = newNotes.length > 0 ? Math.round((completedCount / newNotes.length) * 100) : 0;
                        return { ...sub, notes: newNotes, progress: newProgress, completed: newProgress === 100 };
                    }
                    return sub;
                });
                try { await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks }); } catch(err) { }
            };

            const editHistoryNote = async (projectId, subtaskId, noteIndex, newText) => {
                if (!newText.trim()) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const editTime = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes[noteIndex] = { ...newNotes[noteIndex], text: newText, lastEdit: editTime };
                        return { ...sub, notes: newNotes };
                    }
                    return sub;
                });
                try { await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks }); } catch(err) { }
            };

            const deleteHistoryNote = async (projectId, subtaskId, noteIndex) => {
                if (!window.confirm("Remover nota?")) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes.splice(noteIndex, 1);
                        const completedCount = newNotes.filter(n => n.completed).length;
                        const newProgress = newNotes.length > 0 ? Math.round((completedCount / newNotes.length) * 100) : (sub.completed ? 100 : 0);
                        return { ...sub, notes: newNotes, progress: newProgress, completed: newProgress === 100 };
                    }
                    return sub;
                });
                try { await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks }); } catch(err) { }
            };

            const sortedProjects = useMemo(() => {
                const statusWeight = { 'Andamento': 1, 'Pendente': 2, 'Planeamento': 3, 'Concluído': 4 };
                const priorityWeight = { 'Alta': 1, 'Média': 2, 'Baixa': 3 };
                return [...projects].sort((a, b) => {
                    const isAConcluido = a.status === 'Concluído';
                    const isBConcluido = b.status === 'Concluído';
                    if (isAConcluido && !isBConcluido) return 1;
                    if (!isAConcluido && isBConcluido) return -1;
                    if (isAConcluido && isBConcluido) {
                        const dateA = a.end ? new Date(a.end) : 0;
                        const dateB = b.end ? new Date(b.end) : 0;
                        return dateB - dateA;
                    }
                    const sA = statusWeight[a.status] || 99;
                    const sB = statusWeight[b.status] || 99;
                    if (sA !== sB) return sA - sB;
                    const pA = priorityWeight[a.priority] || 2;
                    const pB = priorityWeight[b.priority] || 2;
                    if (pA !== pB) return pA - pB;
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return timeB - timeA;
                });
            }, [projects]);

            const filteredProjects = useMemo(() => {
                if (!searchTerm.trim()) return sortedProjects;
                const term = searchTerm.toLowerCase();

                return sortedProjects.filter(p => {
                    const projectMatch = 
                        p.title.toLowerCase().includes(term) ||
                        (p.owner && p.owner.toLowerCase().includes(term)) ||
                        (p.team && p.team.toLowerCase().includes(term)) ||
                        (p.company && p.company.toLowerCase().includes(term));
                    
                    if (projectMatch) return true;

                    if (p.subtasks && Array.isArray(p.subtasks)) {
                        return p.subtasks.some(sub => {
                            if (sub.title.toLowerCase().includes(term)) return true;
                            if (sub.notes && Array.isArray(sub.notes)) {
                                return sub.notes.some(note => note.text.toLowerCase().includes(term));
                            }
                            return false;
                        });
                    }
                    return false;
                });
            }, [sortedProjects, searchTerm]);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 10);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const colRef = collection(db, DB_COLLECTION);
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (loading || !chartRef.current || projects.length === 0 || !user) return;
                const a = projects.filter(proj => proj.status === 'Andamento').length;
                const p = projects.filter(proj => proj.status === 'Pendente').length;
                const pl = projects.filter(proj => proj.status === 'Planeamento').length;
                const c = projects.filter(proj => proj.status === 'Concluído').length;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Em Execução', 'Pendente', 'Planeamento', 'Finalizados'],
                        datasets: [{ 
                            data: [a, p, pl, c], 
                            backgroundColor: ['#fffbeb', '#fff1f2', '#f0f9ff', '#f0fdf4'], 
                            hoverBackgroundColor: ['#fef3c7', '#fecdd3', '#bae6fd', '#bbf7d0'],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        cutout: '75%', 
                        plugins: { 
                            legend: { 
                                position: 'bottom',
                                labels: { usePointStyle: true, padding: 15, font: { weight: '600', family: 'Inter', size: 10 } }
                            } 
                        } 
                    }
                });
            }, [projects, loading, user]);

            const stats = {
                total: projects.length,
                pending: projects.filter(p => p.status === 'Pendente').length,
                progress: projects.filter(p => p.status === 'Andamento').length,
                planning: projects.filter(p => p.status === 'Planeamento').length,
                completed: projects.filter(p => p.status === 'Concluído').length
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black tracking-widest uppercase text-xs">A autenticar...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-slide text-center relative">
                            <h2 className="text-2xl font-black text-slate-900 mb-2">Portal IDW</h2>
                            <p className="text-slate-400 font-bold text-[10px] uppercase tracking-[0.2em] mb-8">Gestão de Projetos</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" placeholder="Email"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" placeholder="Senha"/>
                                {loginError && <p className="text-rose-500 text-[10px] font-black">{loginError}</p>}
                                <button type="submit" disabled={isLoggingIn} className="w-full btn-premium btn-primary py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">
                                    {isLoggingIn ? 'Acedendo...' : 'Entrar'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen text-slate-800 flex flex-col">
                    <div className={`sticky-header-container px-4 md:px-10 ${isScrolled ? 'scrolled-header' : ''}`}>
                        <div className="max-w-[1700px] mx-auto flex items-center justify-between">
                            <div className="logo-section-print">
                                <div className="logo-box"><i className="fas fa-layer-group text-sm"></i></div>
                                <div className="logo-text">
                                    <h1>IDW</h1>
                                    <span>Gestão 2026 • <b className="text-rose-500 font-bold lowercase italic ml-1 tracking-tight text-[12px]">{user.email}</b></span>
                                </div>
                            </div>

                            <div className="flex-1 flex justify-center">
                                <div className="stats-pill-container shadow-sm">
                                    <div className="stat-item"><div className="dot bg-amber-400"></div><span>{stats.progress} EXECUÇÃO</span></div>
                                    <div className="stat-item"><div className="dot bg-emerald-400"></div><span>{stats.completed} FIM</span></div>
                                    <div className="stat-item"><div className="dot bg-rose-400"></div><span>{stats.pending} PEND</span></div>
                                    <div className="stat-item"><div className="dot bg-sky-400"></div><span>{stats.planning} PLAN</span></div>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <div className="search-container-print">
                                    <i className="fas fa-magnifying-glass text-slate-400 text-sm"></i>
                                    <input type="text" placeholder="Pesquisar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>

                                <div className="flex items-center gap-1 border-l border-slate-100 pl-2">
                                    <button onClick={exportBackup} className="icon-btn-print" title="Backup"><i className="fas fa-file-export text-[14px]"></i></button>
                                    <button onClick={triggerImport} className="icon-btn-print" title="Restore"><i className="fas fa-file-import text-[14px]"></i></button>
                                    <input type="file" ref={fileInputRef} onChange={importBackup} accept=".json" style={{ display: 'none' }} />
                                    <button onClick={() => setGlobalCollapse(prev => ({ collapsed: !prev.collapsed, count: prev.count + 1 }))} className="icon-btn-print" title="Expandir/Recolher"><i className={globalCollapse.collapsed ? 'fas fa-up-right-and-down-left-from-center' : 'fas fa-minimize'}></i></button>
                                    <button onClick={() => setHideCompleted(!hideCompleted)} className="icon-btn-print" title="Filtro Concluídos"><i className={hideCompleted ? 'fas fa-eye text-indigo-500' : 'fas fa-eye-slash'}></i></button>
                                </div>

                                <button onClick={() => setIsTaskModalOpen(true)} className="btn-main-print shadow-md hover:brightness-105 transition-all ml-2">
                                    <i className="fas fa-plus text-[10px]"></i> NOVO PROJETO
                                </button>
                                <button onClick={handleLogout} className="btn-logout-print ml-1"><i className="fas fa-power-off"></i></button>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-[1700px] mx-auto px-4 md:px-12 py-8 flex-grow w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div className="lg:col-span-8 space-y-8">
                                {filteredProjects.map(p => (
                                    <ProjectCard 
                                        key={p.id} p={p} 
                                        isCompact={hideCompleted && p.status === 'Concluído'}
                                        globalCollapse={globalCollapse} 
                                        searchTerm={searchTerm}
                                        onEdit={() => openEditTask(p)}
                                        onDelete={() => deleteProject(p.id)}
                                        onStatus={(s) => updateStatus(p.id, s)}
                                        onToggleSub={(sId) => toggleSub(p.id, sId)}
                                        onEditSubtask={(sId, nTitle) => editSubtask(p.id, sId, nTitle)}
                                        onDeleteSubtask={(sId) => deleteSubtask(p.id, sId)}
                                        onAddHistoryNote={(sId, txt) => addHistoryNote(p.id, sId, txt)}
                                        onEditHistoryNote={(sId, nIdx, txt) => editHistoryNote(p.id, sId, nIdx, txt)}
                                        onDeleteHistoryNote={(sId, nIdx) => deleteHistoryNote(p.id, sId, nIdx)}
                                        onToggleHistoryNote={(sId, nIdx) => toggleHistoryNote(p.id, sId, nIdx)}
                                        onAddSub={() => { setSubtaskData({ parentId: p.id, subId: null, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                    />
                                ))}
                            </div>
                            
                            <div className="lg:col-span-4 space-y-6">
                                <div className="glass-card p-6 rounded-[2rem] sticky top-[100px]">
                                    <h2 className="text-sm font-black text-slate-800 mb-6 flex items-center gap-3"><i className="fas fa-chart-line text-indigo-500"></i> Analytics</h2>
                                    <div className="relative h-48 mb-6"><canvas ref={chartRef}></canvas></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase">Execução</p>
                                            <p className="text-xl font-black text-indigo-600">{stats.progress}</p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase">Concluídos</p>
                                            <p className="text-xl font-black text-emerald-600">{stats.completed}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xl modal-compact-container animate-slide overflow-y-auto max-h-[90vh] shadow-2xl border border-slate-100 flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-black text-slate-900 tracking-tight">{editingId ? 'Editar Registo' : 'Novo Projeto'}</h3>
                                    <button onClick={closeTaskModal} className="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 hover:text-rose-500 transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={saveProject} className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                                    <div className="col-span-full space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Identificação do Projeto</label>
                                        <input required type="text" placeholder="Nome do Projeto..." value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-4 focus:ring-indigo-500/5 font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Data Início</label>
                                        <input required type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Data Limite</label>
                                        <input required type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-rose-600"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Prioridade</label>
                                        <select value={taskData.priority} onChange={e => setTaskData({...taskData, priority: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"><option>Baixa</option><option>Média</option><option>Alta</option></select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Responsável (Owner)</label>
                                        <input type="text" placeholder="Nome..." value={taskData.owner} onChange={e => setTaskData({...taskData, owner: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Equipa</label>
                                        <input type="text" placeholder="Dept..." value={taskData.team} onChange={e => setTaskData({...taskData, team: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Cliente</label>
                                        <input type="text" placeholder="Entidade..." value={taskData.company} onChange={e => setTaskData({...taskData, company: e.target.value})} className="w-full bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"/>
                                    </div>
                                    <div className="col-span-full pt-4 flex gap-3">
                                        <button type="button" onClick={closeTaskModal} className="flex-1 py-3 text-slate-400 font-black uppercase text-[10px] tracking-widest hover:bg-slate-50 rounded-xl">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 btn-premium btn-primary rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg">Salvar Registo</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {}
                    {isSubtaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-md p-6 animate-slide shadow-2xl border border-slate-100">
                                <h3 className="text-xl font-black mb-4 tracking-tight text-slate-900 uppercase">Adicionar Tarefa</h3>
                                <form onSubmit={saveSubtask} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Título da Atividade</label>
                                        <input required type="text" placeholder="Ex: Preparar documentação..." value={subtaskData.title} onChange={e => setSubtaskData({...subtaskData, title: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Relatório Inicial</label>
                                        <textarea placeholder="Requisitos..." required value={subtaskData.note} onChange={e => setSubtaskData({...subtaskData, note: e.target.value})} className="note-input font-medium" rows="3"/>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setIsSubtaskModalOpen(false)} className="flex-1 py-3 text-slate-400 font-black uppercase tracking-widest text-[10px] hover:bg-slate-50 rounded-xl">Voltar</button>
                                        <button type="submit" className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black uppercase tracking-widest text-[10px] hover:bg-black shadow-lg transition-all">Registar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProjectCard({ p, isCompact, globalCollapse, searchTerm, onEdit, onDelete, onStatus, onToggleSub, onEditSubtask, onDeleteSubtask, onAddSub, onAddHistoryNote, onEditHistoryNote, onDeleteHistoryNote, onToggleHistoryNote }) {
            const [isCollapsed, setIsCollapsed] = useState(isCompact);
            const [addingToSubId, setAddingToSubId] = useState(null);
            const [newNoteText, setNewNoteText] = useState("");
            const [editingNote, setEditingNote] = useState({ subId: null, idx: null });
            const [editNoteText, setEditNoteText] = useState("");
            const [editingSubId, setEditingSubId] = useState(null);
            const [editSubTitle, setEditSubTitle] = useState("");

            useEffect(() => { setIsCollapsed(isCompact); }, [isCompact]);
            useEffect(() => { if (globalCollapse && globalCollapse.count > 0 && p.status !== 'Concluído') setIsCollapsed(globalCollapse.collapsed); }, [globalCollapse.count]);

            const total = p.subtasks?.length || 0;
            const sumProgress = p.subtasks?.reduce((acc, sub) => acc + (sub.progress ?? (sub.completed ? 100 : 0)), 0) || 0;
            const progress = total > 0 ? Math.round(sumProgress / total) : (p.status === 'Concluído' ? 100 : 0);
            
            const handleAddNote = (sub) => { if (!newNoteText.trim()) return; onAddHistoryNote(sub.id, newNoteText); setNewNoteText(""); setAddingToSubId(null); };
            const handleSaveEditNote = (subId, idx) => { if (editNoteText.trim() !== "") onEditHistoryNote(subId, idx, editNoteText); setEditingNote({ subId: null, idx: null }); };

            return (
                <div className={`glass-card rounded-[1.5rem] p-5 transition-all ${isCollapsed ? 'opacity-70 bg-slate-50/50' : 'bg-white'}`}>
                    <div className="flex flex-col md:flex-row justify-between gap-6">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`status-pill status-${p.status}`}>{p.status === 'Andamento' ? 'Em Execução' : p.status}</span>
                                <span className="text-[9px] font-black uppercase text-slate-400 bg-slate-100 px-2 py-1 rounded-md">PRIO: {p.priority}</span>
                            </div>
                            <h3 className="text-lg md:text-xl font-black text-slate-900 mb-1 leading-tight break-words">
                                <HighlightedText text={p.title} term={searchTerm} />
                            </h3>
                            <p className="text-[10px] text-slate-400 font-bold uppercase flex items-center gap-2">
                                <i className="far fa-calendar-alt text-indigo-500"></i> 
                                {formatDate(p.start)} — <span className="text-rose-500">{formatDate(p.end)}</span>
                            </p>
                        </div>
                        
                        <div className="flex items-center gap-4 bg-slate-50/50 p-3 rounded-2xl border border-slate-100 min-w-[280px]">
                            <div className="space-y-1.5 text-[10px] flex-1">
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-user-tie text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.owner}</span></div>
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-users text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.team}</span></div>
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-building text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.company}</span></div>
                            </div>
                            <div className="flex flex-col gap-1.5">
                                <button onClick={() => setIsCollapsed(!isCollapsed)} className="w-8 h-8 rounded-lg bg-white shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-indigo-600"><i className={`fas fa-angle-${isCollapsed ? 'down' : 'up'}`}></i></button>
                                <button onClick={onEdit} className="w-8 h-8 rounded-lg bg-white shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-indigo-600"><i className="fas fa-edit"></i></button>
                                <button onClick={() => onDelete(p.id)} className="w-8 h-8 rounded-lg bg-white shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-rose-600"><i className="fas fa-trash-can"></i></button>
                            </div>
                        </div>
                    </div>

                    {!isCollapsed && (
                        <div className="mt-6 pt-6 border-t border-slate-100 animate-slide space-y-4">
                            <div className="flex items-center justify-between gap-4 mb-2">
                                <div className="flex-1">
                                    <div className="flex justify-between text-[9px] font-black text-slate-400 uppercase mb-1"><span>Progresso Real</span><span>{progress}%</span></div>
                                    <div className="progress-bar-container"><div className="progress-bar-fill bg-indigo-500" style={{width: `${progress}%`}}></div></div>
                                </div>
                                <button onClick={onAddSub} className="bg-indigo-600 text-white text-[9px] px-4 py-2 rounded-lg font-black uppercase tracking-widest shadow-md">Nova Atividade</button>
                            </div>

                            <div className="grid grid-cols-1 gap-3">
                                {p.subtasks?.map(sub => (
                                    <div key={sub.id} className="bg-slate-50/50 p-4 rounded-xl border border-slate-100 group/sub">
                                        <div className="flex items-center justify-between gap-3">
                                            <div className="flex items-center gap-3 flex-1">
                                                <input type="checkbox" checked={sub.completed} onChange={() => onToggleSub(sub.id)} className="w-5 h-5 rounded border-slate-200 text-indigo-600 cursor-pointer"/>
                                                <div className="flex-1">
                                                    <p className={`text-xs font-bold ${sub.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>{sub.title}</p>
                                                    <div className="h-1 bg-slate-200 w-24 rounded-full mt-1 overflow-hidden">
                                                        <div className="h-full bg-indigo-400 transition-all" style={{width: `${sub.progress ?? (sub.completed ? 100 : 0)}%`}}></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => setAddingToSubId(addingToSubId === sub.id ? null : sub.id)} className="bg-white border border-slate-100 text-indigo-500 px-3 py-1.5 rounded-lg font-black text-[9px] uppercase shadow-sm">Nota</button>
                                                <button onClick={() => onDeleteSubtask(sub.id)} className="text-rose-200 hover:text-rose-500 transition-colors"><i className="fas fa-trash-can text-[11px]"></i></button>
                                            </div>
                                        </div>
                                        {addingToSubId === sub.id && (
                                            <div className="mt-3 space-y-2 animate-slide">
                                                <textarea className="note-input" placeholder="Detalhes..." value={newNoteText} onChange={(e) => setNewNoteText(e.target.value)} rows="2"/>
                                                <div className="flex justify-end"><button onClick={() => handleAddNote(sub)} className="bg-slate-900 text-white text-[8px] px-3 py-1.5 rounded-lg uppercase font-black">Registar Cloud</button></div>
                                            </div>
                                        )}
                                        {sub.notes?.length > 0 && (
                                            <div className="mt-3 pl-4 border-l-2 border-indigo-100 space-y-2">
                                                {sub.notes.map((n, idx) => {
                                                    const isEditing = editingNote.subId === sub.id && editingNote.idx === idx;
                                                    return (
                                                        <div key={idx} className="text-[10px] text-slate-500 bg-white p-2.5 rounded-lg border border-slate-100 flex items-start gap-3 group/note">
                                                            <input type="checkbox" checked={n.completed || false} onChange={() => onToggleHistoryNote(sub.id, idx)} className="mt-0.5 w-3 h-3 rounded border-slate-200 text-indigo-500 cursor-pointer"/>
                                                            <div className="flex-1">
                                                                {isEditing ? (
                                                                    <div className="space-y-2">
                                                                        <textarea className="note-input w-full" value={editNoteText} onChange={(e) => setEditNoteText(e.target.value)} rows="2"/>
                                                                        <div className="flex justify-end gap-2"><button onClick={() => setEditingNote({subId:null, idx:null})} className="text-[8px] uppercase font-black text-slate-400">Sair</button><button onClick={() => handleSaveEditNote(sub.id, idx)} className="bg-indigo-600 text-white px-2 py-1 rounded text-[8px] uppercase font-black">Salvar</button></div>
                                                                    </div>
                                                                ) : (
                                                                    <>
                                                                        <span className={n.completed ? 'line-through opacity-40' : ''}>{n.text}</span>
                                                                        <div className="flex justify-between items-center mt-1">
                                                                            <span className="text-[7px] text-slate-300 font-bold uppercase tracking-widest">{n.time} {n.lastEdit ? '• EDITADO' : ''}</span>
                                                                            <div className="flex gap-2 opacity-0 group-hover/note:opacity-100 transition-opacity">
                                                                                <button onClick={() => { setEditingNote({subId: sub.id, idx}); setEditNoteText(n.text); }} className="text-indigo-300 hover:text-indigo-600"><i className="fas fa-pencil"></i></button>
                                                                                <button onClick={() => onDeleteHistoryNote(sub.id, idx)} className="text-rose-200 hover:text-rose-500"><i className="fas fa-times"></i></button>
                                                                            </div>
                                                                        </div>
                                                                    </>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function formatDate(s) {
            if (!s) return '-';
            const [y, m, d] = s.split('-');
            return `${d}/${m}/${y}`;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
