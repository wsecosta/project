<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDW Projects - Gestão</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --primary: #4f46e5;
            --bg-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .status-pill {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-Pendente { background: #fee2e2; color: #991b1b; }
        .status-Andamento { background: #fef3c7; color: #92400e; }
        .status-Planeamento { background: #e0f2fe; color: #075985; }
        .status-Concluído { background: #dcfce7; color: #166534; }

        .btn-modern {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
        }
        .btn-modern:active { transform: scale(0.96); }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
        }

        .search-input {
            background: #f1f5f9;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .search-input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        @keyframes slideUp {
            from { transform: translateY(12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideUp 0.3s ease-out; }

        .note-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-left: 3px solid #e2e8f0;
        }

        .status-counter-pill {
            background: rgba(241, 245, 249, 0.6);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            align-items: center;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBou2nfAg9EL2kam8y1_8qPtRcUfJvo9AE",
            authDomain: "ger-projeto-ansr.firebaseapp.com",
            projectId: "ger-projeto-ansr",
            storageBucket: "ger-projeto-ansr.firebasestorage.app",
            messagingSenderId: "409599611361",
            appId: "1:409599611361:web:f9dd2ab0915e14ed3902a0",
            measurementId: "G-PV4NR6B03C"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const DB_COLLECTION = 'projects';

        function HighlightedText({ text, term }) {
            if (!term.trim() || !text) return <span>{text}</span>;
            const parts = text.split(new RegExp(`(${term})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === term.toLowerCase() 
                            ? <mark key={i} className="bg-yellow-200 text-yellow-900 rounded-sm">{part}</mark> 
                            : part
                    )}
                </span>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [hideCompleted, setHideCompleted] = useState(false);
            const [globalCollapse, setGlobalCollapse] = useState({ collapsed: false, count: 0 });
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isSubtaskModalOpen, setIsSubtaskModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [taskData, setTaskData] = useState({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            const [subtaskData, setSubtaskData] = useState({ parentId: '', title: '', note: '' });

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const sortedProjects = useMemo(() => {
                const statusWeight = { 'Andamento': 1, 'Pendente': 2, 'Planeamento': 3, 'Concluído': 4 };
                return [...projects].sort((a, b) => {
                    const isAConcluido = a.status === 'Concluído';
                    const isBConcluido = b.status === 'Concluído';
                    if (isAConcluido && !isBConcluido) return 1;
                    if (!isAConcluido && isBConcluido) return -1;
                    const sA = statusWeight[a.status] || 99;
                    const sB = statusWeight[b.status] || 99;
                    if (sA !== sB) return sA - sB;
                    return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                });
            }, [projects]);

            const filteredProjects = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return sortedProjects.filter(p => 
                    p.title.toLowerCase().includes(term) ||
                    (p.owner && p.owner.toLowerCase().includes(term)) ||
                    (p.subtasks?.some(sub => sub.title.toLowerCase().includes(term)))
                );
            }, [sortedProjects, searchTerm]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = onSnapshot(collection(db, DB_COLLECTION), (snap) => {
                    setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (loading || !chartRef.current || projects.length === 0 || !user) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const a = projects.filter(proj => proj.status === 'Andamento').length;
                const p = projects.filter(proj => proj.status === 'Pendente').length;
                const pl = projects.filter(proj => proj.status === 'Planeamento').length;
                const c = projects.filter(proj => proj.status === 'Concluído').length;
                
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Execução', 'Pendente', 'Plan', 'Fim'],
                        datasets: [{ data: [a, p, pl, c], backgroundColor: ['#fbbf24', '#f87171', '#38bdf8', '#4ade80'], borderWidth: 0 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
                });
            }, [projects, loading, user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                try { await signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Erro de acesso."); }
            };

            const saveProject = async (e) => {
                e.preventDefault();
                if (editingId) await updateDoc(doc(db, DB_COLLECTION, editingId), taskData);
                else await addDoc(collection(db, DB_COLLECTION), { ...taskData, status: 'Pendente', subtasks: [], createdAt: serverTimestamp() });
                setIsTaskModalOpen(false); setEditingId(null);
            };

            const updateStatus = async (id, newStatus) => { await updateDoc(doc(db, DB_COLLECTION, id), { status: newStatus }); };

            const toggleSub = async (tId, sId) => {
                const p = projects.find(proj => proj.id === tId);
                const newSubs = p.subtasks.map(s => s.id === sId ? { ...s, completed: !s.completed } : s);
                
                // --- LÓGICA DE AUTO-ATUALIZAÇÃO DE STATUS ---
                const allCompleted = newSubs.length > 0 && newSubs.every(sub => sub.completed);
                let newStatus = p.status;
                
                if (allCompleted) {
                    newStatus = 'Concluído';
                } else if (!allCompleted && p.status === 'Concluído') {
                    newStatus = 'Andamento';
                } else if (newSubs.some(s => s.completed) && p.status === 'Pendente') {
                    newStatus = 'Andamento';
                }

                await updateDoc(doc(db, DB_COLLECTION, tId), { subtasks: newSubs, status: newStatus });
            };

            const editSubtask = async (projectId, subtaskId, newTitle) => {
                const project = projects.find(p => p.id === projectId);
                const newSubtasks = project.subtasks.map(sub => sub.id === subtaskId ? { ...sub, title: newTitle } : sub);
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const deleteSubtask = async (projectId, subtaskId) => {
                if (!window.confirm("Remover etapa?")) return;
                const project = projects.find(p => p.id === projectId);
                const newSubtasks = project.subtasks.filter(sub => sub.id !== subtaskId);
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const addHistoryNote = async (projectId, subtaskId, text) => {
                if (!text.trim()) return;
                const project = projects.find(p => p.id === projectId);
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) return { ...sub, notes: [...(sub.notes || []), { text, time, completed: false }] };
                    return sub;
                });
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const editHistoryNote = async (projectId, subtaskId, noteIndex, newText) => {
                const project = projects.find(p => p.id === projectId);
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes[noteIndex] = { ...newNotes[noteIndex], text: newText };
                        return { ...sub, notes: newNotes };
                    }
                    return sub;
                });
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const deleteHistoryNote = async (projectId, subtaskId, noteIndex) => {
                const project = projects.find(p => p.id === projectId);
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes.splice(noteIndex, 1);
                        return { ...sub, notes: newNotes };
                    }
                    return sub;
                });
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const saveSubtask = async (e) => {
                e.preventDefault();
                const p = projects.find(proj => proj.id === subtaskData.parentId);
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubs = [...(p.subtasks || []), { id: Date.now().toString(), title: subtaskData.title, completed: false, notes: [{ text: subtaskData.note, time }] }];
                await updateDoc(doc(db, DB_COLLECTION, p.id), { subtasks: newSubs });
                setIsSubtaskModalOpen(false);
            };

            const stats = {
                total: projects.length,
                pending: projects.filter(p => p.status === 'Pendente').length,
                progress: projects.filter(p => p.status === 'Andamento').length,
                planning: projects.filter(p => p.status === 'Planeamento').length,
                completed: projects.filter(p => p.status === 'Concluído').length,
                perc: projects.length ? Math.round((projects.filter(p => p.status === 'Concluído').length / projects.length) * 100) : 0
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center text-[10px] font-black text-indigo-600 uppercase tracking-widest">IDW CLOUD...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-md animate-slide">
                            <h2 className="text-2xl font-black mb-8 text-center text-slate-900">Portal IDW</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="E-mail"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="Password"/>
                                <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-indigo-100">Aceder</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen flex flex-col">
                    <header className="sticky-header py-2 px-4 md:px-8">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-6">
                                <h1 className="text-xl font-black text-slate-900 tracking-tighter">IDW<span className="text-indigo-600">Projects</span></h1>
                                
                                {/* CABEÇALHO CLEAN COM CONTADORES ESTILO image_8737b3.png */}
                                <div className="hidden sm:flex items-center">
                                    <div className="status-counter-pill">
                                        <div className="flex items-center gap-2">
                                            <span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>
                                            <span className="text-[10px] font-bold text-slate-600 uppercase whitespace-nowrap leading-none pt-0.5">{stats.progress} EXECUÇÃO</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
                                            <span className="text-[10px] font-bold text-slate-600 uppercase whitespace-nowrap leading-none pt-0.5">{stats.completed} FIM</span>
                                        </div>
                                        {/* ADICIONADOS OUTROS STATUS NO MESMO PADRÃO PARA COMPLETAR O "TODOS STATUS" */}
                                        <div className="flex items-center gap-2 opacity-60">
                                            <span className="w-2.5 h-2.5 rounded-full bg-rose-400"></span>
                                            <span className="text-[10px] font-bold text-slate-600 uppercase whitespace-nowrap leading-none pt-0.5">{stats.pending} PEND</span>
                                        </div>
                                        <div className="flex items-center gap-2 opacity-60">
                                            <span className="w-2.5 h-2.5 rounded-full bg-sky-400"></span>
                                            <span className="text-[10px] font-bold text-slate-600 uppercase whitespace-nowrap leading-none pt-0.5">{stats.planning} PLAN</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <div className="relative flex-1">
                                    <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
                                    <input 
                                        type="text" placeholder="Pesquisar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                        className="search-input w-full pl-8 pr-4 py-1.5 rounded-lg text-xs font-semibold outline-none"
                                    />
                                </div>
                                <button title="Recolher" onClick={() => setGlobalCollapse(p => ({ ...p, collapsed: !p.collapsed, count: p.count+1 }))} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors"><i className="fas fa-compress-alt"></i></button>
                                <button title="Ocultar Finalizados" onClick={() => setHideCompleted(!hideCompleted)} className={`p-2 transition-colors ${hideCompleted ? 'text-indigo-600' : 'text-slate-400'}`}><i className="fas fa-eye-slash"></i></button>
                                <button onClick={() => setIsTaskModalOpen(true)} className="btn-modern bg-indigo-600 text-white px-4 py-2 rounded-xl text-[10px] uppercase tracking-widest font-black shadow-lg shadow-indigo-100"><i className="fas fa-plus"></i> Projeto</button>
                                <button onClick={() => signOut(auth)} className="p-2 text-rose-400"><i className="fas fa-power-off"></i></button>
                            </div>
                        </div>
                    </header>

                    {}
                    <main className="max-w-7xl mx-auto px-4 md:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full">
                        <div className="lg:col-span-8 space-y-4">
                            {filteredProjects.length === 0 && !loading && (
                                <div className="text-center py-20 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-100">
                                    <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Nenhum projeto encontrado</p>
                                </div>
                            )}
                            {filteredProjects.map(p => (
                                <ProjectCard 
                                    key={p.id} p={p} 
                                    isCompact={hideCompleted && p.status === 'Concluído'}
                                    globalCollapse={globalCollapse} 
                                    searchTerm={searchTerm}
                                    onEdit={() => { setEditingId(p.id); setTaskData(p); setIsTaskModalOpen(true); }}
                                    onDelete={async () => { if(window.confirm("Eliminar?")) await deleteDoc(doc(db, DB_COLLECTION, p.id)); }}
                                    onStatus={(s) => updateStatus(p.id, s)}
                                    onToggleSub={(sId) => toggleSub(p.id, sId)}
                                    onEditSubtask={(sId, title) => editSubtask(p.id, sId, title)}
                                    onDeleteSubtask={(sId) => deleteSubtask(p.id, sId)}
                                    onAddSub={() => { setSubtaskData({ parentId: p.id, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                    onAddNote={(sId, txt) => addHistoryNote(p.id, sId, txt)}
                                    onEditNote={(sId, idx, txt) => editHistoryNote(p.id, sId, idx, txt)}
                                    onDeleteNote={(sId, idx) => deleteHistoryNote(p.id, sId, idx)}
                                />
                            ))}
                        </div>
                        
                        <div className="lg:col-span-4">
                            <div className="glass-card p-6 rounded-[2rem] sticky top-24 shadow-sm">
                                <h4 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-6 pb-2 border-b">Desempenho</h4>
                                <div className="h-48 relative mb-8"><canvas ref={chartRef}></canvas></div>
                                <div className="space-y-3">
                                    <p className="text-[10px] font-black text-slate-400 uppercase italic">Próximos Prazos</p>
                                    {projects.filter(p => p.status !== 'Concluído' && p.end).sort((a,b) => new Date(a.end) - new Date(b.end)).slice(0,3).map(p => (
                                        <div key={p.id} className="p-3 bg-slate-50 border border-slate-100 rounded-2xl flex justify-between items-center group">
                                            <div className="min-w-0">
                                                <p className="text-[11px] font-bold text-slate-700 truncate">{p.title}</p>
                                                <p className="text-[9px] text-slate-400 uppercase">{formatDate(p.end)}</p>
                                            </div>
                                            <i className="fas fa-clock text-amber-400 text-xs"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    {}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-xl p-8 animate-slide">
                                <h3 className="text-xl font-black mb-6">{editingId ? 'Editar Projeto' : 'Novo Projeto'}</h3>
                                <form onSubmit={saveProject} className="space-y-4">
                                    <input required type="text" placeholder="Título do Projeto" value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold"/>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[9px] font-bold uppercase ml-2 text-slate-400 italic">Início</label>
                                            <input required type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl text-xs outline-none"/>
                                        </div>
                                        <div className="space-y-1"><label className="text-[9px] font-bold uppercase ml-2 text-slate-400 italic">Prazo</label>
                                            <input required type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-100 rounded-2xl text-xs outline-none"/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <select value={taskData.priority} onChange={e => setTaskData({...taskData, priority: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold uppercase outline-none">
                                            <option>Baixa</option><option>Média</option><option>Alta</option>
                                        </select>
                                        <input type="text" placeholder="Dono" value={taskData.owner} onChange={e => setTaskData({...taskData, owner: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs outline-none font-semibold"/>
                                    </div>
                                    <div className="flex gap-2 pt-4">
                                        <button type="button" onClick={() => setIsTaskModalOpen(false)} className="flex-1 py-4 font-black text-slate-400 uppercase text-[10px]">Cancelar</button>
                                        <button type="submit" className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isSubtaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-md p-8 animate-slide">
                                <h3 className="text-xl font-black mb-6">Nova Etapa</h3>
                                <form onSubmit={saveSubtask} className="space-y-4">
                                    <input required type="text" placeholder="O que fazer?" value={subtaskData.title} onChange={e => setSubtaskData({...subtaskData, title: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-semibold"/>
                                    <textarea placeholder="Primeira nota de histórico..." required value={subtaskData.note} onChange={e => setSubtaskData({...subtaskData, note: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs" rows="3"/>
                                    <div className="flex gap-2 pt-4">
                                        <button type="button" onClick={() => setIsSubtaskModalOpen(false)} className="flex-1 py-4 font-black text-slate-400 text-[10px] uppercase">Voltar</button>
                                        <button type="submit" className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase">Adicionar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProjectCard({ p, isCompact, globalCollapse, searchTerm, onEdit, onDelete, onStatus, onToggleSub, onEditSubtask, onDeleteSubtask, onAddSub, onAddNote, onEditNote, onDeleteNote }) {
            const [isCollapsed, setIsCollapsed] = useState(isCompact);
            const [activeSubId, setActiveSubId] = useState(null);
            const [noteText, setNoteText] = useState("");
            const [editingNote, setEditingNote] = useState({ subId: null, idx: null, text: "" });
            const [editingSub, setEditingSub] = useState({ id: null, title: "" });
            
            useEffect(() => setIsCollapsed(isCompact), [isCompact]);
            useEffect(() => { if (globalCollapse.count > 0 && p.status !== 'Concluído') setIsCollapsed(globalCollapse.collapsed); }, [globalCollapse.count]);

            const total = p.subtasks?.length || 0;
            const completed = p.subtasks?.filter(s => s.completed).length || 0;
            const progress = total > 0 ? Math.round((completed / total) * 100) : (p.status === 'Concluído' ? 100 : 0);

            return (
                <div className={`glass-card rounded-[2.5rem] p-6 ${isCollapsed ? 'opacity-60 bg-slate-50/50 border-dashed' : 'bg-white shadow-sm hover:border-indigo-200'}`}>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-2">
                                <select value={p.status} onChange={(e) => onStatus(e.target.value)} className={`status-pill status-${p.status} border-none outline-none cursor-pointer`}>
                                    <option value="Andamento">Execução</option><option value="Pendente">Pendente</option><option value="Planeamento">Planeamento</option><option value="Concluído">Finalizado</option>
                                </select>
                                <span className="text-[9px] font-black text-slate-400 uppercase bg-slate-100 px-2 py-1 rounded">Prioridade: {p.priority}</span>
                                <span className="text-[9px] font-bold text-slate-400 uppercase ml-2">Prazo: {formatDate(p.end)}</span>
                            </div>
                            <h3 className="text-lg font-black text-slate-900 truncate"><HighlightedText text={p.title} term={searchTerm} /></h3>
                        </div>

                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block mr-4">
                                <span className="text-[10px] font-black text-indigo-600 uppercase tracking-tighter">{progress}%</span>
                                <div className="w-16 h-1 bg-slate-100 rounded-full mt-1 overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-700" style={{width: `${progress}%`}}></div></div>
                            </div>
                            <button onClick={() => setIsCollapsed(!isCollapsed)} className="w-9 h-9 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-slate-100 transition-colors"><i className={`fas ${isCollapsed ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i></button>
                            <button onClick={onEdit} className="w-9 h-9 rounded-xl bg-indigo-50 text-indigo-500 flex items-center justify-center hover:bg-indigo-100 transition-colors"><i className="fas fa-edit text-xs"></i></button>
                            <button onClick={onDelete} className="w-9 h-9 rounded-xl bg-rose-50 text-rose-400 flex items-center justify-center hover:bg-rose-100 transition-colors"><i className="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>

                    {!isCollapsed && (
                        <div className="mt-8 pt-8 border-t border-slate-50 animate-slide">
                            <div className="flex items-center justify-between mb-6">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 italic">Histórico de Atividades</h4>
                                <button onClick={onAddSub} className="text-[9px] font-black text-white bg-slate-900 px-4 py-2 rounded-xl uppercase hover:bg-black transition-all">+ Etapa</button>
                            </div>
                            
                            <div className="space-y-6">
                                {p.subtasks?.map(sub => (
                                    <div key={sub.id} className="group/sub">
                                        <div className="flex items-center gap-3 mb-4">
                                            <input type="checkbox" checked={sub.completed} onChange={() => onToggleSub(sub.id)} className="w-4 h-4 rounded-lg border-slate-300 text-indigo-600 cursor-pointer"/>
                                            
                                            {editingSub.id === sub.id ? (
                                                <div className="flex items-center gap-2 flex-1">
                                                    <input autoFocus className="flex-1 p-1 text-xs border rounded outline-indigo-500" value={editingSub.title} onChange={e => setEditingSub({...editingSub, title: e.target.value})}/>
                                                    <button onClick={() => { onEditSubtask(sub.id, editingSub.title); setEditingSub({id: null, title: ""}); }} className="text-emerald-500 text-[10px] font-bold">OK</button>
                                                </div>
                                            ) : (
                                                <span className={`text-xs font-bold flex-1 ${sub.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>
                                                    <HighlightedText text={sub.title} term={searchTerm} />
                                                </span>
                                            )}
                                            
                                            <div className="flex gap-2 opacity-0 group-hover/sub:opacity-100 transition-all">
                                                <button onClick={() => setEditingSub({id: sub.id, title: sub.title})} className="text-[10px] text-slate-400"><i className="fas fa-pencil"></i></button>
                                                <button onClick={() => onDeleteSubtask(sub.id)} className="text-[10px] text-rose-300"><i className="fas fa-times"></i></button>
                                                <button onClick={() => { setActiveSubId(activeSubId === sub.id ? null : sub.id); setNoteText(""); }} className="text-[9px] font-bold text-indigo-500 uppercase px-2 py-1 bg-indigo-50 rounded-lg">Nota</button>
                                            </div>
                                        </div>

                                        {activeSubId === sub.id && (
                                            <div className="mb-4 flex gap-2 animate-slide">
                                                <input value={noteText} onChange={e => setNoteText(e.target.value)} type="text" placeholder="Registar atualização..." className="flex-1 p-3 text-[11px] border border-slate-200 rounded-xl bg-slate-50 outline-none focus:ring-1 focus:ring-indigo-400"/>
                                                <button onClick={() => { onAddNote(sub.id, noteText); setNoteText(""); setActiveSubId(null); }} className="bg-indigo-600 text-white px-4 py-1 rounded-xl text-[10px] font-bold">Adicionar</button>
                                            </div>
                                        )}

                                        <div className="space-y-3 ml-6 border-l-2 border-slate-50 pl-4">
                                            {sub.notes?.map((n, idx) => (
                                                <div key={idx} className="note-card p-3 rounded-xl relative group/note">
                                                    {editingNote.subId === sub.id && editingNote.idx === idx ? (
                                                        <div className="flex gap-2">
                                                            <input autoFocus className="flex-1 text-[11px] p-1 border rounded" value={editingNote.text} onChange={e => setEditingNote({...editingNote, text: e.target.value})}/>
                                                            <button onClick={() => { onEditNote(sub.id, idx, editingNote.text); setEditingNote({subId:null, idx:null, text:""}); }} className="text-emerald-500 font-bold text-[10px]">OK</button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex justify-between items-start gap-4">
                                                            <div className="flex flex-col">
                                                                <span className="text-[8px] font-black text-slate-300 uppercase mb-1">{n.time}</span>
                                                                <p className="text-[11px] text-slate-600 leading-relaxed italic"><HighlightedText text={n.text} term={searchTerm} /></p>
                                                            </div>
                                                            <div className="flex gap-2 opacity-0 group-hover/note:opacity-100 transition-all">
                                                                <button onClick={() => setEditingNote({subId: sub.id, idx, text: n.text})} className="text-[9px] text-slate-300 hover:text-indigo-400"><i className="fas fa-edit"></i></button>
                                                                <button onClick={() => onDeleteNote(sub.id, idx)} className="text-[9px] text-slate-300 hover:text-rose-400"><i className="fas fa-trash"></i></button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function formatDate(s) {
            if (!s) return '-';
            const [y, m, d] = s.split('-');
            return `${d}/${m}/${y}`;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
