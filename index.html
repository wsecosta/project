<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Projetos - IDW</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --primary: #4f46e5;
            --bg-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-pill {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-Pendente { background: #fee2e2; color: #991b1b; }
        .status-Andamento { background: #fef3c7; color: #92400e; }
        .status-Planeamento { background: #e0f2fe; color: #075985; }
        .status-Concluído { background: #dcfce7; color: #166534; }

        .progress-bar-container {
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .scrolled-header {
            border-bottom-color: #e2e8f0;
            box-shadow: 0 4px 12px -2px rgba(0,0,0,0.05);
        }

        .btn-action {
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #4f46e5;
            color: white;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.1);
        }

        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }

        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideUp 0.3s ease-out; }

        .note-input {
            background: #fff;
            border: 1px solid #e2e8f0;
            width: 100%;
            font-size: 11px;
            padding: 10px;
            border-radius: 10px;
            outline: none;
        }

        .search-highlight {
            background-color: #fef08a;
            color: #854d0e;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBou2nfAg9EL2kam8y1_8qPtRcUfJvo9AE",
            authDomain: "ger-projeto-ansr.firebaseapp.com",
            projectId: "ger-projeto-ansr",
            storageBucket: "ger-projeto-ansr.firebasestorage.app",
            messagingSenderId: "409599611361",
            appId: "1:409599611361:web:f9dd2ab0915e14ed3902a0",
            measurementId: "G-PV4NR6B03C"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const DB_COLLECTION = 'projects';

        function HighlightedText({ text, term }) {
            if (!term.trim() || !text) return <span>{text}</span>;
            const parts = text.split(new RegExp(`(${term})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === term.toLowerCase() 
                            ? <mark key={i} className="search-highlight">{part}</mark> 
                            : part
                    )}
                </span>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [isScrolled, setIsScrolled] = useState(false);
            const [hideCompleted, setHideCompleted] = useState(false);
            const [globalCollapse, setGlobalCollapse] = useState({ collapsed: false, count: 0 });
            const [searchTerm, setSearchTerm] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isSubtaskModalOpen, setIsSubtaskModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [taskData, setTaskData] = useState({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            const [subtaskData, setSubtaskData] = useState({ parentId: '', subId: null, title: '', note: '' });

            const sortedProjects = useMemo(() => {
                const statusWeight = { 'Andamento': 1, 'Pendente': 2, 'Planeamento': 3, 'Concluído': 4 };
                return [...projects].sort((a, b) => {
                    const isAConcluido = a.status === 'Concluído';
                    const isBConcluido = b.status === 'Concluído';
                    if (isAConcluido && !isBConcluido) return 1;
                    if (!isAConcluido && isBConcluido) return -1;
                    const sA = statusWeight[a.status] || 99;
                    const sB = statusWeight[b.status] || 99;
                    if (sA !== sB) return sA - sB;
                    return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                });
            }, [projects]);

            const filteredProjects = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return sortedProjects.filter(p => 
                    p.title.toLowerCase().includes(term) ||
                    (p.owner && p.owner.toLowerCase().includes(term)) ||
                    (p.subtasks?.some(sub => sub.title.toLowerCase().includes(term)))
                );
            }, [sortedProjects, searchTerm]);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 10);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = onSnapshot(collection(db, DB_COLLECTION), (snap) => {
                    setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                try {
                    await setPersistence(auth, browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) { setLoginError("Erro na autenticação."); }
                finally { setIsLoggingIn(false); }
            };

            const handleLogout = async () => { if (window.confirm("Deseja sair?")) await signOut(auth); };

            const saveProject = async (e) => {
                e.preventDefault();
                try {
                    if (editingId) await updateDoc(doc(db, DB_COLLECTION, editingId), taskData);
                    else await addDoc(collection(db, DB_COLLECTION), { ...taskData, status: 'Pendente', subtasks: [], createdAt: serverTimestamp() });
                    setIsTaskModalOpen(false);
                    setEditingId(null);
                    setTaskData({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
                } catch(err) {}
            };

            const updateStatus = async (id, newStatus) => {
                await updateDoc(doc(db, DB_COLLECTION, id), { status: newStatus });
            };

            const toggleSub = async (tId, sId) => {
                const p = projects.find(proj => proj.id === tId);
                const newSubs = p.subtasks.map(s => s.id === sId ? { ...s, completed: !s.completed } : s);
                await updateDoc(doc(db, DB_COLLECTION, tId), { subtasks: newSubs });
            };

            const stats = {
                total: projects.length,
                pending: projects.filter(p => p.status === 'Pendente').length,
                progress: projects.filter(p => p.status === 'Andamento').length,
                planning: projects.filter(p => p.status === 'Planeamento').length,
                completed: projects.filter(p => p.status === 'Concluído').length,
                perc: projects.length ? Math.round((projects.filter(p => p.status === 'Concluído').length / projects.length) * 100) : 0
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center text-[10px] font-black uppercase tracking-widest text-indigo-600">AUTHENTICATING...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-[2rem] w-full max-w-md animate-slide">
                            <h2 className="text-2xl font-black mb-2 text-center">Portal IDW</h2>
                            <p className="text-center text-slate-400 text-xs mb-8 uppercase font-bold tracking-widest">Acesso Restrito</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="E-mail"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Palavra-passe"/>
                                {loginError && <p className="text-rose-500 text-xs font-bold text-center bg-rose-50 p-2 rounded-lg">{loginError}</p>}
                                <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 transition-all">Aceder</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen flex flex-col">
                    <div className={`sticky-header-container px-6 py-3 ${isScrolled ? 'scrolled-header' : ''}`}>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-6">
                                <h1 className="text-xl font-black text-slate-900 tracking-tighter">IDW<span className="text-indigo-600">Projects</span></h1>
                                <div className="hidden lg:flex items-center gap-1 bg-white border border-slate-200 rounded-xl px-3 py-1.5 shadow-sm">
                                    <i className="fas fa-search text-slate-300 text-[10px]"></i>
                                    <input 
                                        type="text" placeholder="Pesquisar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                        className="bg-transparent border-none outline-none text-[11px] font-medium w-40"
                                    />
                                </div>
                            </div>

                            <div className="flex items-center gap-4 overflow-x-auto hide-scrollbar">
                                <div className="flex items-center gap-3 pr-4 border-r border-slate-200">
                                    <Metric label="Exec" value={stats.progress} color="amber" />
                                    <Metric label="Pendente" value={stats.pending} color="rose" />
                                    <Metric label="Fim" value={stats.completed} color="emerald" />
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setGlobalCollapse(p => ({ ...p, collapsed: !p.collapsed, count: p.count+1 }))} title="Minimizar Tudo" className="btn-action bg-white border border-slate-200 text-slate-500 hover:bg-slate-50">
                                        <i className={globalCollapse.collapsed ? 'fas fa-maximize' : 'fas fa-minimize'}></i>
                                    </button>
                                    <button onClick={() => setHideCompleted(!hideCompleted)} className={`btn-action ${hideCompleted ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-white border-slate-200 text-slate-500'}`}>
                                        <i className={hideCompleted ? 'fas fa-eye' : 'fas fa-eye-slash'}></i>
                                        <span className="hidden sm:inline text-[10px]">{hideCompleted ? 'Ver Tudo' : 'Limpar Vista'}</span>
                                    </button>
                                    <button onClick={() => setIsTaskModalOpen(true)} className="btn-action btn-primary">
                                        <i className="fas fa-plus"></i> <span className="hidden sm:inline">Projeto</span>
                                    </button>
                                    <button onClick={handleLogout} className="btn-action bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white">
                                        <i className="fas fa-power-off"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-6 py-6 flex-grow w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-12 space-y-4">
                            {filteredProjects.map(p => (
                                <ProjectCard 
                                    key={p.id} p={p} 
                                    isCompact={hideCompleted && p.status === 'Concluído'}
                                    globalCollapse={globalCollapse} 
                                    searchTerm={searchTerm}
                                    onEdit={() => { setEditingId(p.id); setTaskData(p); setIsTaskModalOpen(true); }}
                                    onDelete={async () => { if(window.confirm("Eliminar?")) await deleteDoc(doc(db, DB_COLLECTION, p.id)); }}
                                    onStatus={(s) => updateStatus(p.id, s)}
                                    onToggleSub={(sId) => toggleSub(p.id, sId)}
                                    onAddSub={() => { setSubtaskData({ parentId: p.id, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                />
                            ))}
                        </div>
                    </main>

                    {}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl w-full max-w-xl p-8 animate-slide">
                                <h3 className="text-xl font-black mb-6">{editingId ? 'Editar Projeto' : 'Novo Projeto'}</h3>
                                <form onSubmit={saveProject} className="space-y-4">
                                    <input required type="text" placeholder="Título" value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none"/>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="p-3 bg-slate-50 border rounded-xl outline-none text-xs"/>
                                        <input required type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="p-3 bg-slate-50 border rounded-xl outline-none text-xs"/>
                                    </div>
                                    <div className="flex gap-2 pt-4">
                                        <button type="button" onClick={() => setIsTaskModalOpen(false)} className="flex-1 py-3 font-bold text-slate-400">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Metric({ label, value, color }) {
            const colors = {
                amber: "text-amber-600",
                rose: "text-rose-600",
                emerald: "text-emerald-600"
            };
            return (
                <div className="flex flex-col items-center">
                    <span className="text-[8px] font-black uppercase tracking-widest text-slate-400 leading-none mb-1">{label}</span>
                    <span className={`text-xs font-black ${colors[color]}`}>{value}</span>
                </div>
            );
        }

        function ProjectCard({ p, isCompact, globalCollapse, searchTerm, onEdit, onDelete, onStatus, onToggleSub, onAddSub }) {
            const [isCollapsed, setIsCollapsed] = useState(isCompact);
            
            useEffect(() => setIsCollapsed(isCompact), [isCompact]);
            useEffect(() => { 
                if (globalCollapse.count > 0 && p.status !== 'Concluído') setIsCollapsed(globalCollapse.collapsed); 
            }, [globalCollapse.count]);

            const total = p.subtasks?.length || 0;
            const completed = p.subtasks?.filter(s => s.completed).length || 0;
            const progress = total > 0 ? Math.round((completed / total) * 100) : (p.status === 'Concluído' ? 100 : 0);

            return (
                <div className={`glass-card rounded-2xl p-5 ${isCollapsed ? 'opacity-60 grayscale-[0.3]' : 'bg-white shadow-sm'}`}>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-1">
                                <select 
                                    value={p.status} 
                                    onChange={(e) => onStatus(e.target.value)}
                                    className={`status-pill status-${p.status} border-none outline-none cursor-pointer`}
                                >
                                    <option value="Andamento">Execução</option>
                                    <option value="Pendente">Pendente</option>
                                    <option value="Planeamento">Planeamento</option>
                                    <option value="Concluído">Concluído</option>
                                </select>
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Prazo: {formatDate(p.end)}</span>
                            </div>
                            <h3 className="text-base font-black text-slate-900 truncate">
                                <HighlightedText text={p.title} term={searchTerm} />
                            </h3>
                        </div>

                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <span className="text-[9px] font-black text-indigo-600 uppercase">{progress}% OK</span>
                                <div className="w-16 progress-bar-container mt-1"><div className="progress-bar-fill bg-indigo-500" style={{width: `${progress}%`}}></div></div>
                            </div>
                            <button onClick={() => setIsCollapsed(!isCollapsed)} className="w-8 h-8 rounded-lg bg-slate-50 text-slate-400 flex items-center justify-center"><i className={`fas ${isCollapsed ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i></button>
                            <button onClick={onEdit} className="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center"><i className="fas fa-edit text-xs"></i></button>
                            <button onClick={onDelete} className="w-8 h-8 rounded-lg bg-rose-50 text-rose-400 flex items-center justify-center"><i className="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>

                    {!isCollapsed && (
                        <div className="mt-4 pt-4 border-t border-slate-50 animate-slide">
                            <div className="flex items-center justify-between mb-4">
                                <h4 className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Etapas do Projeto</h4>
                                <button onClick={onAddSub} className="text-[9px] font-black text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg uppercase hover:bg-indigo-600 hover:text-white transition-all">+ Nova Etapa</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {p.subtasks?.map(sub => (
                                    <div key={sub.id} className="flex items-center gap-3 p-3 bg-slate-50/50 rounded-xl border border-slate-100">
                                        <input 
                                            type="checkbox" 
                                            checked={sub.completed} 
                                            onChange={() => onToggleSub(sub.id)}
                                            className="w-4 h-4 rounded-lg border-slate-300 text-indigo-600 cursor-pointer"
                                        />
                                        <span className={`text-xs font-bold flex-1 ${sub.completed ? 'line-through text-slate-300' : 'text-slate-600'}`}>
                                            <HighlightedText text={sub.title} term={searchTerm} />
                                        </span>
                                    </div>
                                ))}
                                {(!p.subtasks || p.subtasks.length === 0) && (
                                    <p className="text-[10px] text-slate-400 italic">Sem tarefas definidas.</p>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function formatDate(s) {
            if (!s) return '-';
            const [y, m, d] = s.split('-');
            return `${d}/${m}/${y}`;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
