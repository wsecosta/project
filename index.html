<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDW | Soluções IT | Gestão e Projetos</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-Pendente { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; }
        .status-Andamento { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
        .status-Planeamento { background: #f0f9ff; color: #0284c7; border: 1px solid #bae6fd; }
        .status-Concluído { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        .progress-bar-container {
            height: 8px;
            background: #f1f5f9;
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(16px);
            padding: 0.5rem 0;
            border-bottom: 1px solid transparent;
        }

        .scrolled-header { border-bottom-color: #e2e8f0; }

        .stats-pill-container {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            padding: 4px 16px;
            display: flex;
            flex-direction: row; /* Força horizontal */
            align-items: center;
            gap: 12px;
            height: 36px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .logo-box {
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .modal-compact-container {
            padding: 1.5rem !important;
            gap: 0.75rem !important;
        }
        
        .modal-compact-container input, 
        .modal-compact-container select {
            padding: 0.6rem 0.8rem !important;
            font-size: 0.8rem !important;
            border-radius: 0.75rem !important;
        }

        .note-input {
            background: #fdfdfd;
            border: 1px solid #e2e8f0;
            width: 100%;
            resize: none;
            font-size: 11px;
            padding: 10px;
            border-radius: 12px;
            outline: none;
            white-space: pre-wrap; /* Quebra de linha nas notas */
        }

        .animate-slide { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .search-highlight { background-color: #fef08a; font-weight: 700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBou2nfAg9EL2kam8y1_8qPtRcUfJvo9AE",
            authDomain: "ger-projeto-ansr.firebaseapp.com",
            projectId: "ger-projeto-ansr",
            storageBucket: "ger-projeto-ansr.firebasestorage.app",
            messagingSenderId: "409599611361",
            appId: "1:409599611361:web:f9dd2ab0915e14ed3902a0",
            measurementId: "G-PV4NR6B03C"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const DB_COLLECTION = 'projects';

        function HighlightedText({ text, term }) {
            if (!term.trim() || !text) return <span>{text}</span>;
            const parts = text.split(new RegExp(`(${term})`, 'gi'));
            return (<span>{parts.map((part, i) => part.toLowerCase() === term.toLowerCase() ? <mark key={i} className="search-highlight">{part}</mark> : part)}</span>);
        }

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [isScrolled, setIsScrolled] = useState(false);
            const [hideCompleted, setHideCompleted] = useState(false);
            const [globalCollapse, setGlobalCollapse] = useState({ collapsed: false, count: 0 });
            const [searchTerm, setSearchTerm] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(null);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isSubtaskModalOpen, setIsSubtaskModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [taskData, setTaskData] = useState({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            const [subtaskData, setSubtaskData] = useState({ parentId: '', subId: null, title: '', note: '' });

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 10);
                window.addEventListener('scroll', handleScroll);
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => { setUser(u); setAuthLoading(false); });
                return () => { window.removeEventListener('scroll', handleScroll); unsubscribeAuth(); };
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribeSnap = onSnapshot(collection(db, DB_COLLECTION), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(data);
                    setLoading(false);
                });
                return () => unsubscribeSnap();
            }, [user]);

            useEffect(() => {
                if (!chartRef.current || projects.length === 0 || !user) return;
                const statsData = [
                    projects.filter(p => p.status === 'Andamento').length,
                    projects.filter(p => p.status === 'Pendente').length,
                    projects.filter(p => p.status === 'Planeamento').length,
                    projects.filter(p => p.status === 'Concluído').length
                ];
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Andamento', 'Pendente', 'Planeamento', 'Fim'],
                        datasets: [{ data: statsData, backgroundColor: ['#fffbeb', '#fff1f2', '#f0f9ff', '#f0fdf4'], borderWidth: 1 }]
                    },
                    options: { responsive: true, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { font: { size: 9 } } } } }
                });
            }, [projects, user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                try { await setPersistence(auth, browserSessionPersistence); await signInWithEmailAndPassword(auth, email, password); } catch (err) { setLoginError("Erro de acesso."); }
            };

            const handleLogout = async () => { if (confirm("Deseja sair?")) await signOut(auth); };

            const exportBackup = () => {
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(projects, null, 2));
                const link = document.createElement('a'); link.setAttribute('href', dataUri);
                link.setAttribute('download', `idw_backup.json`); link.click();
            };

            const importBackup = async (e) => {
                const file = e.target.files[0];
                if (!file || !user) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (!confirm(`Importar ${importedData.length} projetos?`)) return;
                        for (const proj of importedData) {
                            const { id, ...data } = proj;
                            await setDoc(doc(db, DB_COLLECTION, id || Date.now().toString()), data);
                        }
                    } catch (err) { console.error(err); }
                };
                reader.readAsText(file);
            };

            const triggerImport = () => fileInputRef.current.click();

            const saveProject = async (e) => {
                e.preventDefault();
                if (editingId) await updateDoc(doc(db, DB_COLLECTION, editingId), taskData);
                else await addDoc(collection(db, DB_COLLECTION), { ...taskData, status: 'Pendente', subtasks: [], createdAt: serverTimestamp(), createdBy: user.uid });
                setIsTaskModalOpen(false); setEditingId(null);
            };

            const updateStatus = async (id, newStatus) => await updateDoc(doc(db, DB_COLLECTION, id), { status: newStatus });

            const toggleSub = async (tId, sId) => {
                const p = projects.find(proj => proj.id === tId);
                const newSubs = p.subtasks.map(s => {
                    if (s.id === sId) {
                        const isComp = !s.completed;
                        const newNotes = (s.notes || []).map(n => ({ ...n, completed: isComp }));
                        return { ...s, completed: isComp, notes: newNotes, progress: isComp ? 100 : 0 };
                    }
                    return s;
                });
                const allDone = newSubs.length > 0 && newSubs.every(s => s.completed);
                await updateDoc(doc(db, DB_COLLECTION, tId), { subtasks: newSubs, status: allDone ? 'Concluído' : (p.status === 'Concluído' ? 'Andamento' : p.status) });
            };

            const addHistoryNote = async (projectId, subtaskId, text) => {
                const project = projects.find(p => p.id === projectId);
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || []), { text, time, completed: false }];
                        const completedCount = newNotes.filter(n => n.completed).length;
                        const newProgress = Math.round((completedCount / newNotes.length) * 100);
                        return { ...sub, notes: newNotes, progress: newProgress, completed: newProgress === 100 };
                    }
                    return sub;
                });
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const toggleHistoryNote = async (projectId, subtaskId, noteIndex) => {
                const project = projects.find(p => p.id === projectId);
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes[noteIndex].completed = !newNotes[noteIndex].completed;
                        const compCount = newNotes.filter(n => n.completed).length;
                        const newProg = Math.round((compCount / newNotes.length) * 100);
                        return { ...sub, notes: newNotes, progress: newProg, completed: newProg === 100 };
                    }
                    return sub;
                });
                await updateDoc(doc(db, DB_COLLECTION, projectId), { subtasks: newSubtasks });
            };

            const saveSubtask = async (e) => {
                e.preventDefault();
                const p = projects.find(proj => proj.id === subtaskData.parentId);
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubs = [...(p.subtasks || []), { id: Date.now().toString(), title: subtaskData.title, completed: false, progress: 0, notes: subtaskData.note.trim() ? [{ text: subtaskData.note, time, completed: false }] : [] }];
                await updateDoc(doc(db, DB_COLLECTION, p.id), { subtasks: newSubs, status: p.status === 'Pendente' ? 'Andamento' : p.status });
                setIsSubtaskModalOpen(false);
            };

            const filteredProjects = projects.filter(p => !searchTerm || p.title.toLowerCase().includes(searchTerm.toLowerCase()));
            const stats = {
                progress: projects.filter(p => p.status === 'Andamento').length,
                completed: projects.filter(p => p.status === 'Concluído').length,
                pending: projects.filter(p => p.status === 'Pendente').length,
                planning: projects.filter(p => p.status === 'Planeamento').length
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white uppercase text-xs font-black">SECURITY SYSTEM...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="bg-white p-12 rounded-[2rem] shadow-2xl w-full max-w-md text-center">
                            <h2 className="text-3xl font-black mb-10">Portal IDW</h2>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Email"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Senha"/>
                                <button type="submit" className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen flex flex-col">
                    <div className={`sticky-header-container px-4 md:px-10 ${isScrolled ? 'scrolled-header' : ''}`}>
                        <div className="max-w-[1700px] mx-auto flex items-center justify-between">
                            <div className="logo-section-print flex items-center gap-2">
                                <div className="logo-box"><i className="fas fa-layer-group text-sm"></i></div>
                                <div className="logo-text">
                                    <h1 className="text-lg font-black leading-tight">IDW</h1>
                                    <span className="text-[9px] font-black uppercase text-rose-500">{user.email}</span>
                                </div>
                            </div>

                            <div className="hidden lg:flex flex-1 justify-center">
                                <div className="stats-pill-container shadow-sm">
                                    <div className="stat-item"><div className="dot bg-amber-400"></div><span>{stats.progress} EXECUÇÃO</span></div>
                                    <div className="stat-item border-l pl-3"><div className="dot bg-emerald-400"></div><span>{stats.completed} FIM</span></div>
                                    <div className="stat-item border-l pl-3"><div className="dot bg-rose-400"></div><span>{stats.pending} PEND</span></div>
                                    <div className="stat-item border-l pl-3"><div className="dot bg-sky-400"></div><span>{stats.planning} PLAN</span></div>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                <div className="search-container-print">
                                    <i className="fas fa-magnifying-glass text-slate-400 text-xs mr-2"></i>
                                    <input type="text" placeholder="Filtrar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="bg-transparent outline-none text-xs" />
                                </div>
                                <button onClick={exportBackup} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 text-slate-400" title="Exportar Backup"><i className="fas fa-file-export"></i></button>
                                <button onClick={triggerImport} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 text-slate-400" title="Importar Backup"><i className="fas fa-file-import"></i></button>
                                <input type="file" ref={fileInputRef} hidden onChange={importBackup} accept=".json" />
                                <button onClick={() => setGlobalCollapse(prev => ({ collapsed: !prev.collapsed, count: prev.count + 1 }))} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 text-slate-400"><i className={globalCollapse.collapsed ? 'fas fa-maximize' : 'fas fa-minimize'}></i></button>
                                <button onClick={() => setHideCompleted(!hideCompleted)} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 text-indigo-500"><i className={hideCompleted ? 'fas fa-eye' : 'fas fa-eye-slash'}></i></button>
                                <button onClick={() => setIsTaskModalOpen(true)} className="btn-main-print shadow-md ml-2 bg-indigo-600 text-white rounded-xl px-4 py-2 text-[9px] font-black uppercase"><i className="fas fa-plus"></i> NOVO</button>
                                <button onClick={handleLogout} className="text-rose-500 ml-2"><i className="fas fa-power-off"></i></button>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-[1700px] mx-auto px-4 md:px-10 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full flex-grow">
                        <div className="lg:col-span-8 space-y-6">
                            {filteredProjects.map(p => (
                                <ProjectCard 
                                    key={p.id} p={p} 
                                    isCompact={hideCompleted && p.status === 'Concluído'}
                                    globalCollapse={globalCollapse} 
                                    searchTerm={searchTerm}
                                    onEdit={() => { setEditingId(p.id); setTaskData(p); setIsTaskModalOpen(true); }}
                                    onDelete={async () => { if (confirm("Eliminar?")) await deleteDoc(doc(db, DB_COLLECTION, p.id)); }}
                                    onStatus={(s) => updateStatus(p.id, s)}
                                    onToggleSub={(sId) => toggleSub(p.id, sId)}
                                    onToggleHistoryNote={(sId, idx) => toggleHistoryNote(p.id, sId, idx)}
                                    onAddHistoryNote={(sId, txt) => addHistoryNote(p.id, sId, txt)}
                                    onAddSub={() => { setSubtaskData({ parentId: p.id, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                />
                            ))}
                        </div>

                        <div className="lg:col-span-4">
                            <div className="glass-card p-6 rounded-[2rem] sticky top-[90px]">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2"><i className="fas fa-chart-pie text-indigo-500"></i> Analytics 2026</h2>
                                <div className="relative h-60 w-full">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                                <div className="mt-8 border-t pt-6 space-y-3">
                                    <div className="flex justify-between text-[10px] font-black uppercase"><span className="text-slate-400">Total de Projetos</span><span>{projects.length}</span></div>
                                    <div className="flex justify-between text-[10px] font-black uppercase"><span className="text-indigo-500">Em Execução</span><span>{stats.progress}</span></div>
                                    <div className="flex justify-between text-[10px] font-black uppercase"><span className="text-emerald-500">Finalizados</span><span>{stats.completed}</span></div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Janelas de Edição Otimizadas */}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xl modal-compact-container animate-slide shadow-2xl border border-slate-100">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-black text-slate-900">{editingId ? 'Editar Registo' : 'Novo Projeto'}</h3>
                                    <button onClick={() => setIsTaskModalOpen(false)} className="text-slate-400 hover:text-rose-500"><i className="fas fa-times"></i></button>
                                </div>
                                <form onSubmit={saveProject} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="col-span-full space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Título do Projeto</label>
                                        <input required type="text" value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full bg-slate-50 border outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Início</label>
                                        <input required type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="w-full bg-slate-50 border outline-none font-bold"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Limite</label>
                                        <input required type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="w-full bg-slate-50 border outline-none font-bold text-rose-600"/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Prioridade</label>
                                        <select value={taskData.priority} onChange={e => setTaskData({...taskData, priority: e.target.value})} className="w-full bg-slate-50 border outline-none font-bold"><option>Baixa</option><option>Média</option><option>Alta</option></select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Responsável</label>
                                        <input type="text" value={taskData.owner} onChange={e => setTaskData({...taskData, owner: e.target.value})} className="w-full bg-slate-50 border outline-none font-bold"/>
                                    </div>
                                    <div className="col-span-full pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsTaskModalOpen(false)} className="flex-1 py-3 text-slate-400 font-black uppercase text-[10px]">Sair</button>
                                        <button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px] shadow-lg">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isSubtaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-md p-6 animate-slide shadow-2xl">
                                <h3 className="text-lg font-black mb-4 uppercase">Nova Atividade</h3>
                                <form onSubmit={saveSubtask} className="space-y-3">
                                    <input required placeholder="O que foi feito..." value={subtaskData.title} onChange={e => setSubtaskData({...subtaskData, title: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none text-sm font-bold"/>
                                    <textarea placeholder="Relatório inicial..." required value={subtaskData.note} onChange={e => setSubtaskData({...subtaskData, note: e.target.value})} className="note-input" rows="3"/>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setIsSubtaskModalOpen(false)} className="flex-1 py-3 text-slate-400 font-black uppercase text-[10px]">Voltar</button>
                                        <button type="submit" className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black uppercase text-[10px]">Gravar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ProjectCard({ p, isCompact, searchTerm, onEdit, onDelete, onStatus, onToggleSub, onAddSub, onToggleHistoryNote, onAddHistoryNote }) {
            const [isCollapsed, setIsCollapsed] = useState(isCompact);
            const [newNote, setNewNote] = useState("");
            const [activeNoteSubId, setActiveNoteSubId] = useState(null);

            const total = p.subtasks?.length || 0;
            const sumProgress = p.subtasks?.reduce((acc, sub) => acc + (sub.progress ?? (sub.completed ? 100 : 0)), 0) || 0;
            const progress = total > 0 ? Math.round(sumProgress / total) : (p.status === 'Concluído' ? 100 : 0);

            return (
                <div className={`glass-card rounded-[1.5rem] p-6 transition-all ${isCollapsed ? 'opacity-70 grayscale-[0.3]' : 'bg-white'}`}>
                    <div className="flex flex-col md:flex-row justify-between gap-6 items-start">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`status-pill status-${p.status}`}>{p.status === 'Andamento' ? 'Execução' : p.status}</span>
                                <span className="text-[9px] font-black uppercase text-slate-400 bg-slate-100 px-2 py-1 rounded-md">Prio: {p.priority}</span>
                            </div>
                            <h3 className="text-xl font-black text-slate-900 leading-tight break-words mb-2">
                                <HighlightedText text={p.title} term={searchTerm} />
                            </h3>
                            <p className="text-[10px] text-slate-400 font-bold uppercase flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg inline-flex border">
                                <i className="far fa-calendar-alt text-indigo-500"></i> {formatDate(p.start)} — <span className="text-rose-500">{formatDate(p.end)}</span>
                            </p>
                            
                            {/* Progresso visível quando fechado */}
                            {isCollapsed && (
                                <div className="mt-4 w-full max-w-xs animate-slide">
                                    <div className="flex justify-between text-[8px] font-black text-slate-400 uppercase mb-1"><span>{progress}% Concluído</span></div>
                                    <div className="progress-bar-container"><div className="progress-bar-fill bg-indigo-500" style={{width: `${progress}%`}}></div></div>
                                </div>
                            )}
                        </div>
                        
                        <div className="flex items-center gap-4 bg-slate-50/50 p-4 rounded-2xl border min-w-[280px]">
                            <div className="space-y-1.5 text-[10px] flex-1">
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-user-tie text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.owner}</span></div>
                                <div className="flex items-center gap-2 font-bold"><i className="fas fa-users text-indigo-400 w-4"></i> <span className="text-slate-600 truncate">{p.team}</span></div>
                            </div>
                            <div className="flex flex-col gap-1.5">
                                <button onClick={() => setIsCollapsed(!isCollapsed)} className="w-8 h-8 rounded-lg bg-white shadow-sm border flex items-center justify-center text-slate-400 hover:text-indigo-600"><i className={`fas fa-angle-${isCollapsed ? 'down' : 'up'}`}></i></button>
                                <button onClick={onEdit} className="w-8 h-8 rounded-lg bg-white shadow-sm border flex items-center justify-center text-slate-400 hover:text-indigo-600"><i className="fas fa-edit"></i></button>
                                <button onClick={onDelete} className="w-8 h-8 rounded-lg bg-white shadow-sm border flex items-center justify-center text-rose-400 hover:bg-rose-50"><i className="fas fa-trash-can"></i></button>
                            </div>
                        </div>
                    </div>

                    {!isCollapsed && (
                        <div className="mt-6 pt-6 border-t space-y-6 animate-slide">
                            <div className="flex items-center justify-between gap-6">
                                <div className="flex-1">
                                    <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-2"><span>Progresso Consolidado</span><span>{progress}%</span></div>
                                    <div className="progress-bar-container"><div className="progress-bar-fill bg-indigo-500 shadow-md" style={{width: `${progress}%`}}></div></div>
                                </div>
                                <button onClick={onAddSub} className="h-9 px-5 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg">Nova Atividade</button>
                            </div>

                            <div className="space-y-4">
                                {p.subtasks?.map(sub => (
                                    <div key={sub.id} className="bg-slate-50/50 p-5 rounded-2xl border-l-4 border-l-indigo-400 group/sub">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="flex items-center gap-4 flex-1">
                                                <input type="checkbox" checked={sub.completed} onChange={() => onToggleSub(sub.id)} className="w-5 h-5 rounded border-2 border-slate-200 text-indigo-600 cursor-pointer"/>
                                                <div className="flex-1">
                                                    <p className={`text-sm font-black ${sub.completed ? 'line-through text-slate-300' : 'text-slate-800'}`}>{sub.title}</p>
                                                    <span className="text-[9px] font-black text-indigo-400 uppercase">{sub.progress ?? (sub.completed ? 100 : 0)}% COMPLETADO</span>
                                                </div>
                                            </div>
                                            <button onClick={() => setActiveNoteSubId(activeNoteSubId === sub.id ? null : sub.id)} className="text-[9px] font-black px-4 py-2 rounded-lg border bg-white text-indigo-600 uppercase">Nota</button>
                                        </div>

                                        {activeNoteSubId === sub.id && (
                                            <div className="mt-4 space-y-3 bg-white p-4 rounded-xl border border-dashed border-indigo-100">
                                                <textarea className="note-input" placeholder="Detalhes da execução..." value={newNote} onChange={e => setNewNote(e.target.value)} rows="3" />
                                                <div className="flex justify-end"><button onClick={() => { onAddHistoryNote(sub.id, newNote); setNewNote(""); setActiveNoteSubId(null); }} className="bg-slate-900 text-white text-[9px] px-4 py-2 rounded-lg font-black uppercase shadow-lg">Registar Cloud</button></div>
                                            </div>
                                        )}

                                        {sub.notes?.length > 0 && (
                                            <div className="mt-4 pl-5 border-l-2 border-indigo-100 space-y-3">
                                                {sub.notes.map((n, idx) => (
                                                    <div key={idx} className="bg-white p-3 rounded-xl border shadow-sm group/note relative">
                                                        <div className="flex items-start gap-4">
                                                            <input type="checkbox" checked={n.completed} onChange={() => onToggleHistoryNote(sub.id, idx)} className="mt-1 w-4 h-4 rounded border-slate-200 text-indigo-500 cursor-pointer"/>
                                                            <div className="flex-1">
                                                                <p className={`text-xs font-medium leading-relaxed whitespace-pre-wrap ${n.completed ? 'line-through opacity-30 text-slate-400' : 'text-slate-600'}`}>{n.text}</p>
                                                                <div className="flex justify-between items-center mt-2 pt-2 border-t text-[8px] text-slate-300 font-bold uppercase tracking-widest">
                                                                    <span><i className="far fa-clock"></i> {n.time}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function formatDate(s) { if (!s) return '-'; const [y, m, d] = s.split('-'); return `${d}/${m}/${y}`; }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
