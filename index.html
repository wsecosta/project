<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Projetos Cloud - Wilson Costa</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --primary: #4f46e5;
            --bg-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #1e293b;
            margin: 0;
        }

        /* Classes utilitárias para esconder a barra de scroll no mobile mas manter o comportamento */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none; /* IE e Edge */
            scrollbar-width: none; /* Firefox */
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .status-pill {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-Pendente { background: #fee2e2; color: #991b1b; }
        .status-Andamento { background: #fef3c7; color: #92400e; }
        .status-Planeamento { background: #e0f2fe; color: #075985; }
        .status-Concluído { background: #dcfce7; color: #166534; }

        .progress-bar-container {
            height: 8px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(12px);
            padding-top: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid transparent;
        }

        .scrolled-header {
            border-bottom-color: #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideUp 0.3s ease-out; }

        .login-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%);
        }

        .note-input {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            width: 100%;
            resize: none;
            font-size: 11px;
            color: #1e293b;
            line-height: 1.5;
            padding: 10px;
            outline: none;
            border-radius: 12px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut,
            setPersistence,
            browserSessionPersistence 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            onSnapshot, 
            addDoc, 
            updateDoc, 
            deleteDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBou2nfAg9EL2kam8y1_8qPtRcUfJvo9AE",
            authDomain: "ger-projeto-ansr.firebaseapp.com",
            projectId: "ger-projeto-ansr",
            storageBucket: "ger-projeto-ansr.firebasestorage.app",
            messagingSenderId: "409599611361",
            appId: "1:409599611361:web:f9dd2ab0915e14ed3902a0",
            measurementId: "G-PV4NR6B03C"
        };

        const appIdentifier = "projeto-wilson-2026";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [isScrolled, setIsScrolled] = useState(false);
            const [hideCompleted, setHideCompleted] = useState(false);

            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isSubtaskModalOpen, setIsSubtaskModalOpen] = useState(false);
            
            const [editingId, setEditingId] = useState(null);
            const [taskData, setTaskData] = useState({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            const [subtaskData, setSubtaskData] = useState({ parentId: '', subId: null, title: '', note: '' });

            const sortedProjects = useMemo(() => {
                const statusWeight = { 
                    'Andamento': 1, 
                    'Pendente': 2, 
                    'Planeamento': 3, 
                    'Concluído': 4 
                };
                const priorityWeight = { 'Alta': 1, 'Média': 2, 'Baixa': 3 };

                return [...projects].sort((a, b) => {
                    // 1. Ordenação por Status (Em execução / Pendente / Planeamento / finalizados)
                    const sA = statusWeight[a.status] || 99;
                    const sB = statusWeight[b.status] || 99;
                    if (sA !== sB) return sA - sB;

                    // 2. Se o status for 'Concluído', ordena apenas pela data de encerramento (mais recentes primeiro)
                    if (a.status === 'Concluído') {
                        const dateA = a.end ? new Date(a.end) : 0;
                        const dateB = b.end ? new Date(b.end) : 0;
                        return dateB - dateA;
                    }

                    // 3. Para outros status, ordena por Prioridade (Alta > Média > Baixa)
                    const pA = priorityWeight[a.priority] || 2;
                    const pB = priorityWeight[b.priority] || 2;
                    if (pA !== pB) return pA - pB;

                    // 4. Critério de desempate: Data de criação
                    const timeA = a.createdAt?.seconds || 0;
                    const timeB = b.createdAt?.seconds || 0;
                    return timeB - timeA;
                });
            }, [projects]);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 10);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const colRef = collection(db, 'artifacts', appIdentifier, 'public', 'data', 'projects');
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(data);
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (loading || !chartRef.current || projects.length === 0 || !user) return;
                const a = projects.filter(proj => proj.status === 'Andamento').length;
                const p = projects.filter(proj => proj.status === 'Pendente').length;
                const pl = projects.filter(proj => proj.status === 'Planeamento').length;
                const c = projects.filter(proj => proj.status === 'Concluído').length;

                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Em Execução', 'Pendente', 'Planeamento', 'Finalizados'],
                        datasets: [{ 
                            data: [a, p, pl, c], 
                            backgroundColor: ['#fef3c7', '#fee2e2', '#e0f2fe', '#dcfce7'], 
                            hoverBackgroundColor: ['#fde68a', '#fecaca', '#bae6fd', '#bbf7d0'],
                            borderWidth: 0 
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        cutout: '80%', 
                        plugins: { 
                            legend: { 
                                position: 'bottom',
                                labels: {
                                    usePointStyle: true,
                                    font: { weight: 'bold', family: 'Inter', size: 10 }
                                }
                            } 
                        } 
                    }
                });
            }, [projects, loading, user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError(null);
                setIsLoggingIn(true);
                try {
                    await setPersistence(auth, browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setLoginError("Acesso negado. Verifique os seus dados.");
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = async () => {
                if (window.confirm("Deseja encerrar a sessão com segurança?")) {
                    try {
                        await signOut(auth);
                        setUser(null);
                        setEmail('');
                        setPassword('');
                    } catch (err) {
                        console.error("Erro ao sair:", err);
                    }
                }
            };

            const exportBackup = () => {
                try {
                    const dataStr = JSON.stringify(projects, null, 2);
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const exportFileDefaultName = `backup_projetos_ansr_${new Date().toISOString().split('T')[0]}.json`;
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', exportFileDefaultName);
                    linkElement.click();
                } catch (error) {
                    console.error("Erro ao gerar backup:", error);
                }
            };

            const closeTaskModal = () => {
                setIsTaskModalOpen(false);
                setEditingId(null);
                setTaskData({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            };

            const openEditTask = (p) => {
                setEditingId(p.id);
                setTaskData({
                    title: p.title || '',
                    start: p.start || '',
                    end: p.end || '',
                    priority: p.priority || 'Média',
                    owner: p.owner || '',
                    team: p.team || '',
                    company: p.company || ''
                });
                setIsTaskModalOpen(true);
            };

            const saveProject = async (e) => {
                e.preventDefault();
                if (!user) return;
                try {
                    const path = `artifacts/${appIdentifier}/public/data/projects`;
                    if (editingId) {
                        await updateDoc(doc(db, path, editingId), taskData);
                    } else {
                        await addDoc(collection(db, path), { 
                            ...taskData, 
                            status: 'Pendente', 
                            subtasks: [], 
                            createdAt: serverTimestamp(),
                            createdBy: user.uid 
                        });
                    }
                    closeTaskModal();
                } catch (err) { 
                    console.error("Erro ao salvar projeto:", err);
                }
            };

            const deleteProject = async (id) => {
                if (!user || !window.confirm("Eliminar este projeto permanentemente?")) return;
                await deleteDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'projects', id));
            };

            const updateStatus = async (id, newStatus) => {
                if (!user) return;
                await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'projects', id), { status: newStatus });
            };

            const saveSubtask = async (e) => {
                e.preventDefault();
                if (!user) return;
                const p = projects.find(proj => proj.id === subtaskData.parentId);
                if (!p) return;

                let newSubs = [...(p.subtasks || [])];
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

                newSubs.push({
                    id: Date.now().toString(),
                    title: subtaskData.title,
                    completed: false,
                    notes: subtaskData.note.trim() ? [{ text: subtaskData.note, time }] : []
                });

                await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'projects', p.id), { 
                    subtasks: newSubs,
                    status: p.status === 'Pendente' || p.status === 'Planeamento' ? 'Andamento' : p.status
                });
                setIsSubtaskModalOpen(false);
                setSubtaskData({ parentId: '', subId: null, title: '', note: '' });
            };

            const toggleSub = async (tId, sId) => {
                const p = projects.find(proj => proj.id === tId);
                const newSubs = p.subtasks.map(s => s.id === sId ? { ...s, completed: !s.completed } : s);
                const allDone = newSubs.length > 0 && newSubs.every(s => s.completed);
                await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'projects', tId), { 
                    subtasks: newSubs,
                    status: allDone ? 'Concluído' : (p.status === 'Concluído' ? 'Andamento' : p.status)
                });
            };

            const addHistoryNote = async (projectId, subtaskId, text) => {
                if (!text.trim()) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const time = new Date().toLocaleString('pt-PT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || []), { text, time }];
                        return { ...sub, notes: newNotes };
                    }
                    return sub;
                });
                await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'projects', projectId), { subtasks: newSubtasks });
            };

            const deleteHistoryNote = async (projectId, subtaskId, noteIndex) => {
                if (!window.confirm("Remover esta nota do histórico?")) return;
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const newSubtasks = project.subtasks.map(sub => {
                    if (sub.id === subtaskId) {
                        const newNotes = [...(sub.notes || [])];
                        newNotes.splice(noteIndex, 1);
                        return { ...sub, notes: newNotes };
                    }
                    return sub;
                });
                await updateDoc(doc(db, 'artifacts', appIdentifier, 'public', 'data', 'projects', projectId), { subtasks: newSubtasks });
            };

            const stats = {
                total: projects.length,
                pending: projects.filter(p => p.status === 'Pendente').length,
                progress: projects.filter(p => p.status === 'Andamento').length,
                planning: projects.filter(p => p.status === 'Planeamento').length,
                completed: projects.filter(p => p.status === 'Concluído').length,
                perc: projects.length ? Math.round((projects.filter(p => p.status === 'Concluído').length / projects.length) * 100) : 0
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center bg-indigo-600 text-white font-bold tracking-widest uppercase">Acessando Sistema em Cloud Security...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen login-bg flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md animate-slide">
                            <div className="text-center mb-8">
                                <div className="bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-indigo-600 text-2xl"><i className="fas fa-lock"></i></div>
                                <h2 className="text-2xl font-black text-slate-900">Acesso Restrito</h2>
                                <p className="text-slate-500 text-sm">ANSR - IDW</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="exemplo@ansr.pt"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="********"/>
                                {loginError && <p className="text-red-500 text-xs font-bold text-center bg-red-50 p-2 rounded-lg">{loginError}</p>}
                                <button type="submit" disabled={isLoggingIn} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg disabled:opacity-50">
                                    {isLoggingIn ? 'Verificando...' : 'Entrar no Sistema'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen text-slate-800 flex flex-col">
                    <div className={`sticky-header-container px-4 md:px-8 ${isScrolled ? 'scrolled-header' : ''}`}>
                        <div className="max-w-7xl mx-auto">
                            <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-6 gap-4 md:gap-6">
                                <div className="flex-shrink-0">
                                    <h1 className="text-3xl font-bold text-slate-900 tracking-tight">Dashboard de Projetos</h1>
                                    <p className="text-slate-500 font-medium text-sm mt-1">IDW - Gestão 2026 • <span className="text-indigo-600 font-bold">{user.email}</span></p>
                                </div>
                                {/* O container dos botões usa overflow-x-auto e hide-scrollbar para não quebrar em telas pequenas */}
                                <div className="flex overflow-x-auto hide-scrollbar gap-3 w-full md:w-auto pb-1">
                                    <button onClick={exportBackup} className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-2 rounded-xl font-bold hover:bg-emerald-100 shadow-sm text-xs flex items-center gap-2 transition-all whitespace-nowrap flex-shrink-0"><i className="fas fa-file-download"></i> Exportar Backup</button>
                                    <button onClick={() => setHideCompleted(!hideCompleted)} className="bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-xl font-bold hover:bg-slate-50 shadow-sm text-xs flex items-center gap-2 whitespace-nowrap flex-shrink-0"><i className={hideCompleted ? 'fas fa-eye-slash text-indigo-500' : 'fas fa-eye'}></i> {hideCompleted ? 'Ver Todos' : 'Ocultar Concluídos'}</button>
                                    <button onClick={() => setIsTaskModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg text-xs flex items-center gap-2 whitespace-nowrap flex-shrink-0"><i className="fas fa-plus"></i> Novo Projeto</button>
                                    <button onClick={handleLogout} className="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all shadow-sm text-xs flex items-center gap-2 whitespace-nowrap flex-shrink-0"><i className="fas fa-sign-out-alt"></i> Sair com Segurança</button>
                                </div>
                            </header>

                            {/* Container dos status convertido para flex com rolagem horizontal em mobile */}
                            <div className="flex overflow-x-auto hide-scrollbar gap-3 mb-2 pb-2 w-full">
                                <StatCard label="Total" value={stats.total} borderColor="border-slate-200" />
                                <StatCard label="Em Execução" value={stats.progress} borderColor="border-amber-400" textColor="text-amber-600" />
                                <StatCard label="Pendente" value={stats.pending} borderColor="border-red-400" textColor="text-red-600" />
                                <StatCard label="Planeamento" value={stats.planning} borderColor="border-sky-400" textColor="text-sky-600" />
                                <StatCard label="Finalizados" value={stats.completed} borderColor="border-green-500" textColor="text-green-600" />
                                
                                {/* Card Eficiência adaptado para não comprimir na visualização horizontal */}
                                <div className="glass-card p-3 md:p-4 rounded-2xl border-l-4 border-indigo-500 shadow-sm flex-shrink-0 min-w-[160px] lg:min-w-0 lg:flex-1">
                                    <p className="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Eficiência</p>
                                    <div className="flex items-center gap-2">
                                        <span className="text-lg md:text-xl font-black text-indigo-600 mt-0.5">{stats.perc}%</span>
                                        <div className="flex-1 progress-bar-container mt-1"><div className="progress-bar-fill bg-indigo-600" style={{width: `${stats.perc}%`}}></div></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 md:px-8 py-6 flex-grow w-full">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-8 space-y-6">
                                {sortedProjects.map(p => (
                                    <ProjectCard 
                                        key={p.id} p={p} 
                                        isCompact={hideCompleted && p.status === 'Concluído'}
                                        onEdit={() => openEditTask(p)}
                                        onDelete={() => deleteProject(p.id)}
                                        onStatus={(s) => updateStatus(p.id, s)}
                                        onToggleSub={(sId) => toggleSub(p.id, sId)}
                                        onAddHistoryNote={(sId, txt) => addHistoryNote(p.id, sId, txt)}
                                        onDeleteHistoryNote={(sId, nIdx) => deleteHistoryNote(p.id, sId, nIdx)}
                                        onAddSub={() => { setSubtaskData({ parentId: p.id, subId: null, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                    />
                                ))}
                                {sortedProjects.length === 0 && !loading && (
                                    <div className="text-center py-20 bg-white rounded-3xl border border-dashed text-slate-400 font-medium">Nenhum projeto encontrado. Comece criando um novo!</div>
                                )}
                            </div>
                            
                            <div className="lg:col-span-4 space-y-6">
                                <div className="glass-card p-6 rounded-3xl sticky top-[280px] shadow-sm">
                                    <h2 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2"><i className="fas fa-chart-pie text-indigo-500"></i> Distribuição Atual</h2>
                                    <div className="relative h-56 mb-8"><canvas ref={chartRef}></canvas></div>

                                    <div className="mt-8 pt-6 border-t border-slate-100">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest text-center mb-4 italic">Próximos Prazos</h3>
                                        <div className="space-y-3">
                                            {projects
                                                .filter(p => p.status !== 'Concluído' && p.end)
                                                .sort((a, b) => new Date(a.end) - new Date(b.end))
                                                .slice(0, 3)
                                                .map(p => (
                                                    <div key={p.id} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center border border-slate-100 hover:bg-white transition-all group">
                                                        <div className="min-w-0">
                                                            <p className="text-xs font-bold truncate pr-2 text-slate-700">{p.title}</p>
                                                            <p className="text-[10px] text-slate-400 font-medium">Fim: {formatDate(p.end)}</p>
                                                        </div>
                                                        <i className="fas fa-clock text-amber-400 text-xs group-hover:scale-110 transition-transform"></i>
                                                    </div>
                                                ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="py-12 text-center text-slate-400 text-xs font-bold opacity-50 tracking-widest italic">By Wilson Costa - IDW - 2026</footer>

                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-2xl p-8 animate-slide overflow-y-auto max-h-[90vh] shadow-2xl">
                                <h3 className="text-2xl font-black mb-6">{editingId ? 'Editar Projeto' : 'Novo Projeto'}</h3>
                                <form onSubmit={saveProject} className="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                                    <div className="space-y-4">
                                        <input required type="text" placeholder="Título" value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"/>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input required type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="p-2 bg-slate-50 border rounded-xl text-xs outline-none"/>
                                            <input required type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="p-2 bg-slate-50 border rounded-xl text-xs outline-none"/>
                                        </div>
                                        <select value={taskData.priority} onChange={e => setTaskData({...taskData, priority: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                                            <option>Baixa</option><option>Média</option><option>Alta</option>
                                        </select>
                                    </div>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Dono" value={taskData.owner} onChange={e => setTaskData({...taskData, owner: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none"/>
                                        <input type="text" placeholder="Equipa" value={taskData.team} onChange={e => setTaskData({...taskData, team: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none"/>
                                        <input type="text" placeholder="Empresa" value={taskData.company} onChange={e => setTaskData({...taskData, company: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none"/>
                                    </div>
                                    <div className="col-span-full pt-4 flex gap-2">
                                        <button type="button" onClick={closeTaskModal} className="flex-1 py-3 text-slate-400 font-bold hover:bg-slate-100 rounded-xl transition-all">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all">Guardar na Nuvem</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {isSubtaskModalOpen && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-md p-8 animate-slide shadow-2xl">
                                <h3 className="text-xl font-black mb-6 tracking-tight text-slate-800">Nova Tarefa</h3>
                                <form onSubmit={saveSubtask} className="space-y-4">
                                    <input required type="text" placeholder="O que precisa de ser feito?" value={subtaskData.title} onChange={e => setSubtaskData({...subtaskData, title: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"/>
                                    <textarea placeholder="Primeira nota de histórico (obrigatória)" required value={subtaskData.note} onChange={e => setSubtaskData({...subtaskData, note: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl text-sm" rows="3"/>
                                    <div className="flex gap-2 pt-4">
                                        <button type="button" onClick={() => setIsSubtaskModalOpen(false)} className="flex-1 py-3 text-slate-400 font-bold hover:bg-slate-100 rounded-xl transition-all">Voltar</button>
                                        <button type="submit" className="flex-1 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-black transition-all">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Ajustado para permitir que não colapse horizontalmente mantendo estilo padrão nos PCs
        function StatCard({ label, value, borderColor, textColor = "text-slate-800" }) {
            return (
                <div className={`glass-card p-3 md:p-4 rounded-2xl shadow-sm border-l-4 flex-shrink-0 min-w-[130px] md:min-w-[150px] lg:min-w-0 lg:flex-1 ${borderColor}`}>
                    <p className="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-wider">{label}</p>
                    <h3 className={`text-lg md:text-xl font-black mt-0.5 ${textColor}`}>{value}</h3>
                </div>
            );
        }

        function ProjectCard({ p, isCompact, onEdit, onDelete, onStatus, onToggleSub, onAddSub, onAddHistoryNote, onDeleteHistoryNote }) {
            const [isManualCollapsed, setIsManualCollapsed] = useState(null);
            const [addingToSubId, setAddingToSubId] = useState(null);
            const [newNoteText, setNewNoteText] = useState("");
            const isCollapsed = isManualCollapsed !== null ? isManualCollapsed : isCompact;

            const done = p.subtasks?.filter(s => s.completed).length || 0;
            const total = p.subtasks?.length || 0;
            const progress = total > 0 ? Math.round((done / total) * 100) : (p.status === 'Concluído' ? 100 : 0);
            
            const handleAddNote = (subId) => {
                if (!newNoteText.trim()) return;
                onAddHistoryNote(subId, newNoteText);
                setNewNoteText("");
                setAddingToSubId(null);
            };
            
            const getStatusLabel = (s) => {
                if (s === 'Andamento') return 'Em Execução';
                if (s === 'Concluído') return 'Finalizado';
                return s;
            };

            return (
                <div className={`glass-card rounded-3xl p-6 shadow-sm transition-all ${isCollapsed ? 'opacity-70 border-dashed bg-slate-50/50' : 'bg-white hover:border-indigo-200'}`}>
                    <div className="flex flex-col lg:flex-row justify-between gap-6">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`status-pill status-${p.status}`}>{getStatusLabel(p.status)}</span>
                                <span className="text-[10px] font-black uppercase text-slate-400 bg-slate-100 px-2 py-1 rounded tracking-tighter">Prio: {p.priority}</span>
                            </div>
                            <h3 className="text-xl font-black text-slate-800 truncate">{p.title}</h3>
                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-2 font-medium"><i className="far fa-calendar-alt text-indigo-400"></i> {formatDate(p.start)} — {formatDate(p.end)}</p>
                        </div>
                        <div className="flex flex-col justify-center bg-slate-50 p-4 rounded-2xl min-w-[280px] border border-slate-100 group relative">
                            <button onClick={onEdit} className="absolute top-2 right-2 text-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity p-2 hover:bg-white rounded-lg"><i className="fas fa-pencil text-[10px]"></i></button>
                            <div className="space-y-1.5 text-xs text-slate-600">
                                <div className="flex items-center gap-2"><i className="fas fa-user-tie text-indigo-500 w-4 text-center"></i><span className="font-bold text-slate-400 uppercase text-[8px] w-12">Dono:</span><span className="truncate font-semibold">{p.owner || "---"}</span></div>
                                <div className="flex items-center gap-2"><i className="fas fa-users text-indigo-500 w-4 text-center"></i><span className="font-bold text-slate-400 uppercase text-[8px] w-12">Equipa:</span><span className="truncate font-semibold">{p.team || "---"}</span></div>
                                <div className="flex items-center gap-2"><i className="fas fa-building text-indigo-500 w-4 text-center"></i><span className="font-bold text-slate-400 uppercase text-[8px] w-12">Empresa:</span><span className="truncate font-semibold">{p.company || "---"}</span></div>
                            </div>
                        </div>
                        <div className="flex items-start gap-2">
                            <button onClick={() => setIsManualCollapsed(!isCollapsed)} title={isCollapsed ? "Expandir" : "Minimizar"} className={`p-3 rounded-xl transition-all shadow-sm ${isCollapsed ? 'bg-amber-50 text-amber-600 hover:bg-amber-600 hover:text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><i className={`fas ${isCollapsed ? 'fa-plus' : 'fa-minus'}`}></i></button>
                            {!isCollapsed && <button onClick={onAddSub} title="Adicionar Tarefa" className="p-3 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><i className="fas fa-plus"></i></button>}
                            <button onClick={() => onDelete(p.id)} title="Eliminar Projeto" className="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all shadow-sm"><i className="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    {!isCollapsed && (
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-8 border-t border-slate-50 mt-6 pt-6 animate-in">
                            <div className="md:col-span-4">
                                <div className="flex justify-between items-end mb-2"><span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Evolução Geral</span><span className="text-sm font-black text-indigo-600">{progress}%</span></div>
                                <div className="progress-bar-container"><div className="progress-bar-fill bg-indigo-600" style={{width: `${progress}%`}}></div></div>
                                <div className="mt-4">
                                     <select value={p.status} onChange={(e) => onStatus(e.target.value)} className="w-full p-2 bg-slate-50 border-none rounded-lg text-[10px] font-bold uppercase tracking-wider outline-none cursor-pointer hover:bg-slate-100 transition-colors">
                                        <option value="Andamento">Em Execução</option>
                                        <option value="Pendente">Pendente</option>
                                        <option value="Planeamento">Planeamento</option>
                                        <option value="Concluído">Finalizado</option>
                                    </select>
                                </div>
                            </div>
                            <div className="md:col-span-8 space-y-4">
                                {p.subtasks?.map(sub => (
                                    <div key={sub.id} className="bg-slate-50/50 p-4 rounded-2xl border border-transparent hover:border-slate-100 transition-all">
                                        <div className="flex items-center justify-between mb-2">
                                            <div className="flex items-center gap-3">
                                                <input type="checkbox" checked={sub.completed} onChange={() => onToggleSub(sub.id)} className="w-5 h-5 rounded-lg border-slate-300 text-indigo-600 cursor-pointer"/>
                                                <p className={`font-bold text-sm ${sub.completed ? 'line-through text-slate-400' : 'text-slate-700'}`}>{sub.title}</p>
                                            </div>
                                            <button onClick={() => setAddingToSubId(addingToSubId === sub.id ? null : sub.id)} className={`text-[10px] font-bold px-3 py-1 rounded-lg transition-all flex items-center gap-2 ${addingToSubId === sub.id ? 'bg-indigo-600 text-white' : 'bg-white text-indigo-600 border border-indigo-100 hover:bg-indigo-50'}`}><i className="fas fa-pencil"></i> {addingToSubId === sub.id ? 'Cancelar' : 'Nova Nota'}</button>
                                        </div>
                                        {addingToSubId === sub.id && (
                                            <div className="mb-4 animate-slide">
                                                <textarea className="note-input mb-2" placeholder="Descreva a nova atualização..." value={newNoteText} onChange={(e) => setNewNoteText(e.target.value)} rows="3" autoFocus />
                                                <div className="flex justify-end gap-2"><button onClick={() => handleAddNote(sub.id)} className="bg-indigo-600 text-white text-[10px] px-4 py-2 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition-all">Guardar Registo</button></div>
                                            </div>
                                        )}
                                        {sub.notes && sub.notes.length > 0 && (
                                            <div className="space-y-2 mt-3">
                                                {sub.notes.map((n, idx) => (
                                                    <div key={idx} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm group/history relative">
                                                        <p className="text-[11px] text-slate-600 leading-relaxed italic pr-8">"{n.text}"</p>
                                                        <div className="flex justify-between items-center mt-2 border-t border-slate-50 pt-2">
                                                            <span className="text-[8px] font-bold text-slate-300 uppercase tracking-widest flex items-center gap-1"><i className="far fa-clock"></i> {n.time}</span>
                                                            <button onClick={() => onDeleteHistoryNote(sub.id, idx)} className="opacity-0 group-hover/history:opacity-100 text-red-200 hover:text-red-500 transition-all p-1" title="Remover registo"><i className="fas fa-trash-alt text-[9px]"></i></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function formatDate(s) {
            if (!s) return '-';
            const [y, m, d] = s.split('-');
            return `${d}/${m}/${y}`;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
