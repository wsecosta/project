<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Projetos - IDW</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-main: #fcfdfe;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #0f172a;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.03) 0px, transparent 50%);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border-color: #e2e8f0;
        }

        .status-pill {
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.025em;
            text-transform: uppercase;
        }

        .status-Pendente { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .status-Andamento { background: #fffbeb; color: #f59e0b; border: 1px solid #fef3c7; }
        .status-Planeamento { background: #eff6ff; color: #3b82f6; border: 1px solid #dbeafe; }
        .status-Concluído { background: #ecfdf5; color: #10b981; border: 1px solid #d1fae5; }

        .progress-bar-container {
            height: 10px;
            background: #f1f5f9;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .sticky-header-container {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            padding-top: 1rem; 
            padding-bottom: 0.75rem; 
            border-bottom: 1px solid #f1f5f9;
        }

        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        .btn-vibrant {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }
        .btn-vibrant:hover {
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
            transform: scale(1.02);
        }

        .search-highlight {
            background-color: #fef08a;
            color: #854d0e;
            padding: 1px 3px;
            border-radius: 4px;
            font-weight: 700;
        }

        .note-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            width: 100%;
            resize: none;
            font-size: 12px;
            color: #334155;
            padding: 12px;
            outline: none;
            border-radius: 14px;
            transition: all 0.2s ease;
        }
        .note-input:focus {
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBou2nfAg9EL2kam8y1_8qPtRcUfJvo9AE",
            authDomain: "ger-projeto-ansr.firebaseapp.com",
            projectId: "ger-projeto-ansr",
            storageBucket: "ger-projeto-ansr.firebasestorage.app",
            messagingSenderId: "409599611361",
            appId: "1:409599611361:web:f9dd2ab0915e14ed3902a0",
            measurementId: "G-PV4NR6B03C"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const DB_COLLECTION = 'projects';

        function HighlightedText({ text, term }) {
            if (!term.trim() || !text) return <span>{text}</span>;
            const parts = text.split(new RegExp(`(${term})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === term.toLowerCase() 
                            ? <mark key={i} className="search-highlight">{part}</mark> 
                            : part
                    )}
                </span>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [authLoading, setAuthLoading] = useState(true);
            const [isScrolled, setIsScrolled] = useState(false);
            
            const [hideCompleted, setHideCompleted] = useState(false);
            const [globalCollapse, setGlobalCollapse] = useState({ collapsed: false, count: 0 });
            
            const [searchTerm, setSearchTerm] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const fileInputRef = useRef(null);

            const [isTaskModalOpen, setIsTaskModalOpen] = useState(false);
            const [isSubtaskModalOpen, setIsSubtaskModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [taskData, setTaskData] = useState({ title: '', start: '', end: '', priority: 'Média', owner: '', team: '', company: '' });
            const [subtaskData, setSubtaskData] = useState({ parentId: '', subId: null, title: '', note: '' });

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubscribe = onSnapshot(collection(db, DB_COLLECTION), (snapshot) => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const filteredProjects = useMemo(() => {
                let result = [...projects].sort((a, b) => {
                    const statusWeight = { 'Andamento': 1, 'Pendente': 2, 'Planeamento': 3, 'Concluído': 4 };
                    return (statusWeight[a.status] || 99) - (statusWeight[b.status] || 99);
                });

                if (searchTerm.trim()) {
                    const term = searchTerm.toLowerCase();
                    result = result.filter(p => 
                        p.title.toLowerCase().includes(term) ||
                        p.owner?.toLowerCase().includes(term) ||
                        p.subtasks?.some(s => s.title.toLowerCase().includes(term))
                    );
                }
                return result;
            }, [projects, searchTerm]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                try {
                    await setPersistence(auth, browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) { setLoginError("Credenciais inválidas."); }
                finally { setIsLoggingIn(false); }
            };

            if (authLoading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black uppercase tracking-widest">Acessando Cloud...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-indigo-600 p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md animate-slide text-center">
                            <h2 className="text-3xl font-black text-slate-900 mb-2">Sistema IDW</h2>
                            <p className="text-slate-500 text-sm mb-8 font-medium">Gestão de Projetos</p>
                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" placeholder="E-mail"/>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" placeholder="Senha"/>
                                {loginError && <p className="text-red-500 text-xs font-bold">{loginError}</p>}
                                <button type="submit" disabled={isLoggingIn} className="w-full btn-vibrant text-white py-4 rounded-2xl font-black uppercase tracking-widest">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-50 min-h-screen flex flex-col">
                    <div className="sticky-header-container px-4 md:px-8">
                        <div className="max-w-7xl mx-auto">
                            <header className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-4 gap-4">
                                <div>
                                    <h1 className="text-2xl font-black text-slate-950 tracking-tighter">Projetos <span className="text-indigo-600">IDW</span></h1>
                                    <p className="text-slate-500 font-bold text-[10px] uppercase tracking-widest">{user.email}</p>
                                </div>
                                
                                <div className="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                                    <div className="relative flex-grow max-w-md">
                                        <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                                        <input type="text" placeholder="Pesquisar..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-2xl text-xs outline-none focus:ring-4 focus:ring-indigo-50 shadow-sm"/>
                                    </div>
                                    
                                    {}
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setGlobalCollapse(prev => ({ collapsed: !prev.collapsed, count: prev.count + 1 }))}
                                            className="bg-white text-slate-600 px-4 py-2.5 rounded-2xl font-bold text-[11px] flex items-center gap-2 border border-slate-200 hover:bg-slate-50 transition-all"
                                        >
                                            <i className={`fas ${globalCollapse.collapsed ? 'fa-expand' : 'fa-compress'} text-indigo-500`}></i>
                                            {globalCollapse.collapsed ? 'Expandir Ativos' : 'Minimizar Ativos'}
                                        </button>
                                        
                                        <button 
                                            onClick={() => setHideCompleted(!hideCompleted)}
                                            className="bg-white text-slate-600 px-4 py-2.5 rounded-2xl font-bold text-[11px] flex items-center gap-2 border border-slate-200 hover:bg-slate-50 transition-all"
                                        >
                                            <i className={`fas ${hideCompleted ? 'fa-eye' : 'fa-eye-slash'} text-emerald-500`}></i>
                                            {hideCompleted ? 'Expandir Finalizados' : 'Minimizar Finalizados'}
                                        </button>

                                        <button onClick={() => setIsTaskModalOpen(true)} className="btn-vibrant text-white px-6 py-2.5 rounded-2xl font-black text-[11px] uppercase tracking-widest flex items-center gap-2">
                                            <i className="fas fa-plus"></i> Novo
                                        </button>
                                        
                                        <button onClick={() => signOut(auth)} className="bg-red-50 text-red-500 px-4 py-2.5 rounded-2xl font-bold text-[11px] border border-red-100 hover:bg-red-500 hover:text-white transition-all">
                                            <i className="fas fa-power-off"></i>
                                        </button>
                                    </div>
                                </div>
                            </header>
                            
                            <div className="flex overflow-x-auto hide-scrollbar gap-4 mb-2 pb-2">
                                <StatCard label="Total" value={projects.length} icon="fa-layer-group" color="indigo" />
                                <StatCard label="Execução" value={projects.filter(p => p.status === 'Andamento').length} icon="fa-bolt" color="amber" />
                                <StatCard label="Pendentes" value={projects.filter(p => p.status === 'Pendente').length} icon="fa-clock" color="red" />
                                <StatCard label="Finalizados" value={projects.filter(p => p.status === 'Concluído').length} icon="fa-check-double" color="emerald" />
                            </div>
                        </div>
                    </div>

                    <main className="max-w-7xl mx-auto px-4 md:px-8 py-6 w-full">
                        <div className="space-y-6">
                            {filteredProjects.map(p => (
                                <ProjectCard 
                                    key={p.id} p={p} 
                                    isCompact={hideCompleted && p.status === 'Concluído'}
                                    globalCollapse={globalCollapse}
                                    searchTerm={searchTerm}
                                    onEdit={() => { setEditingId(p.id); setTaskData(p); setIsTaskModalOpen(true); }}
                                    onDelete={async () => { if(window.confirm("Eliminar?")) await deleteDoc(doc(db, DB_COLLECTION, p.id)); }}
                                    onStatus={async (s) => await updateDoc(doc(db, DB_COLLECTION, p.id), { status: s })}
                                    onAddSub={() => { setSubtaskData({ parentId: p.id, subId: null, title: '', note: '' }); setIsSubtaskModalOpen(true); }}
                                />
                            ))}
                        </div>
                    </main>
                    
                    {/* MODALS (Simplified for speed) */}
                    {isTaskModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-xl p-10 animate-slide">
                                <h3 className="text-2xl font-black mb-8">{editingId ? 'Editar' : 'Novo'} Projeto</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    if(editingId) await updateDoc(doc(db, DB_COLLECTION, editingId), taskData);
                                    else await addDoc(collection(db, DB_COLLECTION), { ...taskData, status: 'Pendente', subtasks: [], createdAt: serverTimestamp() });
                                    setIsTaskModalOpen(false); setEditingId(null);
                                }} className="space-y-4">
                                    <input required placeholder="Título" value={taskData.title} onChange={e => setTaskData({...taskData, title: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100"/>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="date" value={taskData.start} onChange={e => setTaskData({...taskData, start: e.target.value})} className="p-4 bg-slate-50 rounded-2xl outline-none text-xs"/>
                                        <input type="date" value={taskData.end} onChange={e => setTaskData({...taskData, end: e.target.value})} className="p-4 bg-slate-50 rounded-2xl outline-none text-xs"/>
                                    </div>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setIsTaskModalOpen(false)} className="flex-1 py-4 font-bold text-slate-400">Cancelar</button>
                                        <button type="submit" className="flex-[2] py-4 btn-vibrant text-white rounded-2xl font-black uppercase tracking-widest">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function StatCard({ label, value, icon, color }) {
            const colors = {
                indigo: "text-indigo-600 bg-indigo-50",
                amber: "text-amber-600 bg-amber-50",
                red: "text-red-600 bg-red-50",
                emerald: "text-emerald-600 bg-emerald-50"
            };
            return (
                <div className="glass-card px-6 py-4 rounded-[2rem] min-w-[160px] flex-1">
                    <div className="flex justify-between items-center mb-2">
                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-sm ${colors[color]}`}><i className={`fas ${icon}`}></i></div>
                        <span className="text-xl font-black text-slate-900">{value}</span>
                    </div>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{label}</p>
                </div>
            );
        }

        function ProjectCard({ p, isCompact, globalCollapse, searchTerm, onEdit, onDelete, onStatus, onAddSub }) {
            const [isCollapsed, setIsCollapsed] = useState(isCompact);
            
            useEffect(() => { setIsCollapsed(isCompact); }, [isCompact]);
            useEffect(() => { 
                if (globalCollapse.count > 0 && p.status !== 'Concluído') {
                    setIsCollapsed(globalCollapse.collapsed); 
                }
            }, [globalCollapse.count]);

            const progress = p.subtasks?.length ? Math.round((p.subtasks.filter(s => s.completed).length / p.subtasks.length) * 100) : (p.status === 'Concluído' ? 100 : 0);

            return (
                <div className={`glass-card rounded-[2.5rem] p-7 transition-all ${isCollapsed ? 'bg-slate-50/40 opacity-80' : 'bg-white'}`}>
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6">
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`status-pill status-${p.status}`}>{p.status}</span>
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Prio: {p.priority}</span>
                            </div>
                            <h3 className="text-xl font-black text-slate-900 truncate">
                                <HighlightedText text={p.title} term={searchTerm} />
                            </h3>
                        </div>
                        
                        <div className="flex items-center gap-4 w-full lg:w-auto">
                            <div className="flex-1 lg:w-48">
                                <div className="flex justify-between items-center mb-1 text-[9px] font-black uppercase text-slate-400">
                                    <span>Progresso</span>
                                    <span className="text-indigo-600">{progress}%</span>
                                </div>
                                <div className="progress-bar-container"><div className="progress-bar-fill" style={{width: `${progress}%`}}></div></div>
                            </div>
                            
                            <div className="flex gap-2">
                                <button onClick={() => setIsCollapsed(!isCollapsed)} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${isCollapsed ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-400'}`}>
                                    <i className={`fas ${isCollapsed ? 'fa-plus' : 'fa-minus'}`}></i>
                                </button>
                                <button onClick={onEdit} className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i className="fas fa-edit"></i></button>
                                <button onClick={onDelete} className="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center"><i className="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>

                    {!isCollapsed && (
                        <div className="mt-8 pt-8 border-t border-slate-100 animate-slide">
                            <div className="flex justify-between items-center mb-6">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Detalhes & Tarefas</h4>
                                <button onClick={onAddSub} className="text-indigo-600 font-black text-[10px] uppercase flex items-center gap-2"><i className="fas fa-plus-circle"></i> Adicionar Tarefa</button>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                <div className="p-4 bg-slate-50 rounded-2xl">
                                    <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Status do Projeto</p>
                                    <select value={p.status} onChange={e => onStatus(e.target.value)} className="w-full bg-transparent font-bold text-xs outline-none">
                                        <option value="Andamento">Execução</option>
                                        <option value="Pendente">Pendente</option>
                                        <option value="Planeamento">Planeamento</option>
                                        <option value="Concluído">Finalizado</option>
                                    </select>
                                </div>
                                <div className="p-4 bg-slate-50 rounded-2xl">
                                    <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Dono / Responsável</p>
                                    <p className="font-bold text-xs text-slate-700">{p.owner || 'Não atribuído'}</p>
                                </div>
                                <div className="p-4 bg-slate-50 rounded-2xl">
                                    <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Prazos</p>
                                    <p className="font-bold text-xs text-slate-700">Até {p.end ? new Date(p.end).toLocaleDateString() : 'Sem data'}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
